name: Docker -- caddy-s3 (canonical builder)

# Build-residency principle (T-build-residency / pending ADR):
# Universe platform pillars must build OUTSIDE Universe to avoid
# bootstrap chicken-egg. caddy-s3 powers the static-apps serve plane on
# gxy-cassiopeia; building it on Woodpecker (gxy-launchbase, inside
# Universe) creates a circular dependency at recovery time. This
# workflow runs on github-hosted runners (external) and pushes to GHCR
# (external). The Woodpecker pipeline `.woodpecker/caddy-s3-build.yaml`
# is retained as a secondary builder pending T-build-residency cleanup.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/k3s-universe
    paths:
      - "docker/images/caddy-s3/**"
      - ".github/workflows/docker--caddy-s3.yml"

jobs:
  test:
    name: Module tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.26"
          cache-dependency-path: docker/images/caddy-s3/modules/r2alias/go.sum

      - name: Run module tests
        working-directory: docker/images/caddy-s3/modules/r2alias
        run: go test -race -count=1 ./...

  build-and-push:
    name: Build + push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      # Cross-org push: freecodecamp/infra repo → ghcr.io/freecodecamp-universe
      # namespace. GITHUB_TOKEN scope is repo-org only, so a PAT with
      # `write:packages` on the freecodecamp-universe org is required.
      # Repo secrets:
      #   GHCR_PUSH_USER  — bot username (e.g. freeCodeCamp-bot)
      #   GHCR_PUSH_TOKEN — PAT with write:packages on freecodecamp-universe
      - name: Log in to the GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_PUSH_USER }}
          password: ${{ secrets.GHCR_PUSH_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5
        with:
          images: ghcr.io/freecodecamp-universe/caddy-s3
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest-main,enable={{is_default_branch}}

      - name: Cache Docker layers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-caddy-s3-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-caddy-s3-

      - name: Build and push Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: ./docker/images/caddy-s3
          file: ./docker/images/caddy-s3/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
