name: OpenTofu -- Linode-OPS-Test

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/ops-test/**"
  workflow_dispatch:

defaults:
  run:
    shell: bash

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  tofu-format:
    if: github.event_name == 'pull_request' || github.event_name ==
      'workflow_dispatch'
    runs-on: ubuntu-latest
    name: OpenTofu Format Check
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1.0.8
        with:
          tofu_wrapper: false

      - name: OpenTofu Format Check
        run: tofu fmt -check
        working-directory: terraform/ops-test

  tofu-plan:
    if: github.event_name == 'pull_request' || github.event_name ==
      'workflow_dispatch'
    runs-on: ubuntu-latest
    name: OpenTofu Plan
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.R2_ACCESS_KEY_ID }}"
          echo "::add-mask::${{ secrets.R2_SECRET_ACCESS_KEY }}"
          echo "::add-mask::${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "::add-mask::${{ secrets.R2_BUCKET_NAME }}"

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1.0.8
        with:
          tofu_wrapper: false

      - name: OpenTofu Init
        working-directory: terraform/ops-test
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          tofu init -upgrade \
            -backend-config="bucket=${{ secrets.R2_BUCKET_NAME }}" \
            -backend-config="key=ops-test/terraform.tfstate" \
            -backend-config="region=auto" \
            -backend-config="endpoints={s3=\"https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}" \
            -backend-config="use_path_style=true" \
            -backend-config="skip_region_validation=true" \
            -backend-config="skip_credentials_validation=true" \
            -backend-config="skip_requesting_account_id=true" \
            -backend-config="skip_s3_checksum=true"

      - name: OpenTofu Plan
        working-directory: terraform/ops-test
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          tofu plan -no-color -out=plan.bin
          tofu show -no-color plan.bin
