apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-env-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hatchet.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine
type: Opaque
stringData:
  DATABASE_URL: {{ required ".Values.secretEnv.DATABASE_URL is required (set via the sops overlay; carries HATCHET_DB_PASSWORD)" .Values.secretEnv.DATABASE_URL | quote }}
