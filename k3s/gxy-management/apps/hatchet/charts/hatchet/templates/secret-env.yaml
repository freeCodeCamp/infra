# Hook resource (weight -15): the migrate/seed pre-install hook jobs
# consume this secret via secretKeyRef before regular manifests exist
# (same ordering failure class as the bootstrap SA). Pure function of
# values — safe to delete + recreate on every upgrade. Survives
# uninstall (orphaned hook) — runbook 09 §E.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-env-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hatchet.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-15"
    helm.sh/hook-delete-policy: before-hook-creation
type: Opaque
stringData:
  DATABASE_URL: {{ required ".Values.secretEnv.DATABASE_URL is required (set via the sops overlay; carries HATCHET_DB_PASSWORD)" .Values.secretEnv.DATABASE_URL | quote }}
