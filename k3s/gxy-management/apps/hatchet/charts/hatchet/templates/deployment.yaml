apiVersion: apps/v1
kind: Deployment
metadata:
  name: hatchet-engine
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hatchet.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine
spec:
  replicas: {{ .Values.engine.replicas }}
  selector:
    matchLabels:
      {{- include "hatchet.engineSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hatchet.engineSelectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: engine
          image: {{ .Values.images.engine }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: grpc
              containerPort: {{ .Values.engine.grpcPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.engine.healthPort }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-env-secret
                  key: DATABASE_URL
            # Binary default is 7070; the platform contract is 7077
            # (artemis netpol + HATCHET_ADDR + upstream release compose).
            - name: SERVER_GRPC_PORT
              value: {{ .Values.engine.grpcPort | quote }}
            - name: SERVER_GRPC_BIND_ADDRESS
              value: "0.0.0.0"
            - name: SERVER_GRPC_BROADCAST_ADDRESS
              value: "hatchet-engine.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.engine.grpcPort }}"
            # Plaintext gRPC intra-cluster; the artemis worker pairs
            # this with HATCHET_CLIENT_TLS_STRATEGY=none.
            - name: SERVER_GRPC_INSECURE
              value: "true"
            # PG-as-MQ: binary default is rabbitmq
            # (pkg/config/server/server.go MessageQueueConfigFile);
            # postgres is the supported single-store mode.
            - name: SERVER_MSGQUEUE_KIND
              value: postgres
            - name: SERVER_DEFAULT_ENGINE_VERSION
              value: V1
            # Default-on phone-home to https://security.hatchet.run —
            # egress CNP drops it (PG+DNS only); disable at source.
            - name: SERVER_SECURITY_CHECK_ENABLED
              value: "false"
            # "health" must be listed explicitly: HasService() is an
            # exact match, "all" does NOT enable the /live + /ready
            # server (cmd/hatchet-engine/engine/run.go:161).
            - name: SERVER_SERVICES
              value: "all health"
            - name: SERVER_AUTH_COOKIE_DOMAIN
              value: "hatchet-engine.{{ .Values.namespace }}.svc.cluster.local"
            - name: SERVER_AUTH_COOKIE_INSECURE
              value: "true"
            - name: SERVER_URL
              value: "http://hatchet-engine.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.engine.healthPort }}"
            - name: SERVER_LOGGER_LEVEL
              value: warn
            - name: SERVER_LOGGER_FORMAT
              value: json
            - name: DATABASE_LOGGER_LEVEL
              value: warn
            - name: DATABASE_LOGGER_FORMAT
              value: json
          envFrom:
            # Generated by the quickstart job: SERVER_AUTH_COOKIE_SECRETS
            # + SERVER_ENCRYPTION_{MASTER,JWT_PRIVATE,JWT_PUBLIC}_KEYSET.
            - secretRef:
                name: {{ .Values.bootstrap.keysetSecretName }}
          startupProbe:
            httpGet:
              path: /live
              port: health
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /live
              port: health
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.engine.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
