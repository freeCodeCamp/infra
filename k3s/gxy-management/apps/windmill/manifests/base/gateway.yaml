apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: windmill-gateway
  namespace: windmill
spec:
  gatewayClassName: traefik
  listeners:
    - name: websecure
      protocol: HTTPS
      port: 8443
      hostname: windmill.freecodecamp.net
      tls:
        mode: Terminate
        certificateRefs:
          - name: windmill-tls-cloudflare
      allowedRoutes:
        namespaces:
          from: Same
    - name: web
      protocol: HTTP
      port: 8000
      hostname: windmill.freecodecamp.net
      allowedRoutes:
        namespaces:
          from: Same
