apiVersion: batch/v1
kind: CronJob
metadata:
  name: windmill-backup
  namespace: windmill
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 1800
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: ghcr.io/freecodecamp/postgres-rclone@sha256:294e8b276ee23b44f6a16bcef6239f55e4e93ecad7372af7a079650f8a6583e5
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  FILENAME="windmill-${TIMESTAMP}.sql.gz"
                  R2_PREFIX="windmill/${GALAXY}"
                  R2_PATH="${R2_PREFIX}/${FILENAME}"

                  echo "Starting backup: ${FILENAME}"
                  PGPASSWORD="${PGPASSWORD}" pg_dumpall \
                    -h windmill-postgresql \
                    -U postgres \
                    --clean \
                    --if-exists | gzip > "/tmp/${FILENAME}"

                  FILESIZE=$(stat -c%s "/tmp/${FILENAME}" 2>/dev/null || stat -f%z "/tmp/${FILENAME}")
                  echo "Backup size: ${FILESIZE} bytes"

                  echo "Uploading to r2:${R2_BUCKET}/${R2_PATH}"
                  rclone copyto "/tmp/${FILENAME}" "r2:${R2_BUCKET}/${R2_PATH}"

                  echo "Pruning backups older than 7d under r2:${R2_BUCKET}/${R2_PREFIX}/"
                  rclone delete --min-age 7d "r2:${R2_BUCKET}/${R2_PREFIX}/"

                  echo "Backup complete: ${R2_PATH}"
              env:
                # Galaxy literal — only place the slug appears in this manifest;
                # mirror to a sibling k3s/<galaxy>/apps/windmill/ tree by
                # editing this single line.
                - name: GALAXY
                  value: gxy-management
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: windmill-backup-r2
                      key: PG_PASSWORD
                - name: R2_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: windmill-backup-r2
                      key: R2_BUCKET
                # rclone reads remote `r2` from RCLONE_CONFIG_R2_* env vars;
                # RCLONE_CONFIG=/dev/null refuses any on-disk rclone.conf
                # so the readOnlyRootFilesystem securityContext holds.
                - name: RCLONE_CONFIG
                  value: /dev/null
                - name: RCLONE_CONFIG_R2_TYPE
                  value: s3
                - name: RCLONE_CONFIG_R2_PROVIDER
                  value: Cloudflare
                - name: RCLONE_CONFIG_R2_ACL
                  value: private
                - name: RCLONE_CONFIG_R2_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: windmill-backup-r2
                      key: R2_ENDPOINT
                - name: RCLONE_CONFIG_R2_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: windmill-backup-r2
                      key: R2_ACCESS_KEY
                - name: RCLONE_CONFIG_R2_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: windmill-backup-r2
                      key: R2_SECRET_KEY
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                # /tmp is writable scratch for pg_dump output before
                # the gzipped dump streams to R2. emptyDir tmpfs keeps
                # the secret-laden plaintext off the node disk + dies
                # with the pod.
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                medium: Memory
                sizeLimit: 512Mi
