apiVersion: v1
kind: Namespace
metadata:
  name: windmill
  labels:
    # PSS baseline (not restricted) — windmill upstream chart workloads
    # are not yet audited for restricted compliance, and the backup
    # CronJob's pg_dumpall needs a writable /tmp (handled via emptyDir
    # tmpfs, but adding more friction here would block ops). Tighten
    # to restricted once the upstream workloads are audited.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
