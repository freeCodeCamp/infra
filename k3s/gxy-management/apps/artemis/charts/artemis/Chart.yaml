apiVersion: v2
name: artemis
description: |
  Artemis — Universe deploy proxy. Go service that authenticates GitHub
  OAuth device-flow tokens, validates per-site team membership against
  the Valkey-backed sites registry, mints HS256 deploy-session JWTs,
  and forwards authorized PUTs to Cloudflare R2 with admin S3 keys
  held cluster-side.

  Built and stored outside Universe (build-residency + run-residency
  per ADR-017 — see ~/DEV/fCC-U/Universe/decisions/017-build-run-residency.md
  and the §2026-04-27 RUN-residency clause in
  ~/DEV/fCC-U/Universe/spike/field-notes/infra.md). Pulls from
  ghcr.io/freecodecamp/artemis direct.

  Chart owns: Deployment, Service, ConfigMap (non-secret env), Secret
  (env + TLS), Gateway + HTTPRoute (Traefik gateway class),
  NetworkPolicy. No upstream chart — greenfield.
type: application
# Chart version (this chart's release cadence — bump on chart-shape changes).
version: 0.2.0
# appVersion tracks the artemis service tag in GHCR — bump alongside
# image tag rolls in values.production.yaml so `helm list` reflects
# what is actually running.
appVersion: "0.1.0"
home: https://github.com/freeCodeCamp/artemis
sources:
  - https://github.com/freeCodeCamp/artemis
keywords:
  - universe
  - artemis
  - deploy-proxy
  - r2
maintainers:
  - name: freeCodeCamp Infra Team
    url: https://github.com/freeCodeCamp/infra
