apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-tls-cloudflare
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
type: kubernetes.io/tls
stringData:
  # CF Origin cert covering uploads.freecode.camp (wildcard
  # *.freecode.camp acceptable — same cert family as gxy-cassiopeia
  # caddy uses for tenant sites). Mint via CF dashboard → Origin
  # Server → Create Certificate → 15y validity.
  #
  # Rotate via:
  #   sops decrypt --input-type yaml --output-type yaml \
  #     infra-secrets/k3s/gxy-management/artemis.values.yaml.enc | yq ...
  # Then re-seal + `just helm-upgrade gxy-management artemis`.
  tls.crt: {{ required ".Values.tls.cert is required (provide via sops overlay)" .Values.tls.cert | quote }}
  tls.key: {{ required ".Values.tls.key is required (provide via sops overlay)" .Values.tls.key | quote }}
