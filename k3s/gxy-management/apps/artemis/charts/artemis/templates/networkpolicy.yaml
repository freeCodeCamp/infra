{{- if .Values.networkPolicy.enabled -}}
# Cilium-native NetworkPolicy.  Uses CiliumNetworkPolicy (NOT vanilla
# `networking.k8s.io/v1` NetworkPolicy) because the cluster's CNI is
# Cilium and Traefik runs `hostNetwork: true`. Vanilla NetworkPolicy
# `namespaceSelector` matches do NOT resolve hostNetwork pods back to
# their k8s namespace — would silently block Traefik on cross-node hops
# (mirrors caddy pattern at gxy-cassiopeia/apps/caddy).
#
# Ingress: any in-cluster entity to TCP :8080 (artemis HTTP API).
#          Traefik hostNetwork → matches `host` entity reliably.
# Egress:  cluster DNS (Cilium DNS proxy) + R2 + GitHub API + ghcr.io
#          (image pulls happen at kubelet, not pod, but listed for
#          completeness on future curl/probe paths).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  ingress:
    - fromEntities:
        - cluster
        - host
      toPorts:
        - ports:
            - port: "{{ .Values.service.targetPort }}"
              protocol: TCP
  egress:
    # DNS — Cilium DNS proxy on kube-dns. L7 rules:dns block required
    # so toFQDNs entries below are populated (otherwise FQDN egress
    # silently drops with empty IP set).
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*.r2.cloudflarestorage.com"
              - matchPattern: "api.github.com"
              - matchPattern: "ghcr.io"
    # R2 — admin S3 endpoint (account-scoped subdomain).
    - toFQDNs:
        - matchPattern: "*.r2.cloudflarestorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # GitHub API — token validation + team-membership probe.
    - toFQDNs:
        - matchName: "api.github.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Valkey registry (cross-namespace). Selects the valkey chart's
    # StatefulSet pod label set in namespace `valkey`. Chart label
    # contract: `app.kubernetes.io/name: valkey`. Update both sides
    # if the valkey chart changes labels.
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": valkey
            "k8s:app.kubernetes.io/name": valkey
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
{{- end }}
