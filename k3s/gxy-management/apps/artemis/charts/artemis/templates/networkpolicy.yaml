{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "artemis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Traefik is the only legitimate ingress source — runs hostNetwork
    # in kube-system. Match by namespace; pod label selectors on
    # hostNetwork pods do not behave consistently across CNIs.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
  egress:
    # DNS — kube-dns / coredns lookups (R2 endpoint, GitHub API).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS to the public internet (R2, GitHub API). NetworkPolicy
    # cannot match by hostname, so this is necessarily a CIDR allow.
    # Acceptable: artemis only initiates outbound to known APIs;
    # admin S3 keys are scoped to the configured bucket.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
{{- end }}
