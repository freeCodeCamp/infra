apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
    # PSS baseline — artemis runs unprivileged Go binary, no escalation
    # required. Keep namespace at the cluster default. Do NOT add to
    # the privileged-exempt list (that list is reserved for tailscale +
    # windmill workers per CLAUDE.md §Non-obvious Conventions).
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
