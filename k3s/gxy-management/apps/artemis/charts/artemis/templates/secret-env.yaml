apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-env-secret
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Secret env keys — populated by sops overlay
  # (infra-secrets/k3s/gxy-management/artemis.values.yaml.enc).
  # Rotate via sops re-encrypt + helm upgrade.
  R2_ENDPOINT:           {{ required ".Values.secretEnv.R2_ENDPOINT is required (provide via sops overlay)" .Values.secretEnv.R2_ENDPOINT | quote }}
  R2_ACCESS_KEY_ID:      {{ required ".Values.secretEnv.R2_ACCESS_KEY_ID is required (provide via sops overlay)" .Values.secretEnv.R2_ACCESS_KEY_ID | quote }}
  R2_SECRET_ACCESS_KEY:  {{ required ".Values.secretEnv.R2_SECRET_ACCESS_KEY is required (provide via sops overlay)" .Values.secretEnv.R2_SECRET_ACCESS_KEY | quote }}
  GH_CLIENT_ID:          {{ required ".Values.secretEnv.GH_CLIENT_ID is required (provide via sops overlay)" .Values.secretEnv.GH_CLIENT_ID | quote }}
  JWT_SIGNING_KEY:       {{ required ".Values.secretEnv.JWT_SIGNING_KEY is required (provide via sops overlay)" .Values.secretEnv.JWT_SIGNING_KEY | quote }}
  VALKEY_PASSWORD:       {{ required ".Values.secretEnv.VALKEY_PASSWORD is required (must match valkey chart's secretEnv.VALKEY_PASSWORD)" .Values.secretEnv.VALKEY_PASSWORD | quote }}
  # Apollo-11 GitHub App credentials (ADR-016 §2026-05-29 amendment).
  # When ALL THREE are set, artemis enables /api/repo* routes; when
  # ALL THREE are absent, the feature is off and the routes are not
  # mounted. Partial config = artemis validate() failure at boot, so
  # chart emits all-or-none via the if-and gate below.
  {{- if and .Values.secretEnv.GH_APP_ID .Values.secretEnv.GH_APP_INSTALLATION_ID .Values.secretEnv.GH_APP_PRIVATE_KEY }}
  GH_APP_ID:              {{ .Values.secretEnv.GH_APP_ID | quote }}
  GH_APP_INSTALLATION_ID: {{ .Values.secretEnv.GH_APP_INSTALLATION_ID | quote }}
  GH_APP_PRIVATE_KEY:     {{ .Values.secretEnv.GH_APP_PRIVATE_KEY | quote }}
  {{- end }}
