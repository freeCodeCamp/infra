apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
    app.kubernetes.io/component: deploy-proxy
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "artemis.selectorLabels" . | nindent 6 }}
      # apps/v1 spec.selector is immutable — releasing this change
      # over a live deployment fails with "field is immutable". MUST
      # be preceded by `kubectl -n artemis delete deployment artemis
      # --cascade=orphan`; the recreated deployment adopts the orphaned
      # ReplicaSet (live RS labels verified to carry the component
      # label — dossier B12). Runbook 02 stage-2 documents the window.
      app.kubernetes.io/component: deploy-proxy
  template:
    metadata:
      labels:
        {{- include "artemis.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: deploy-proxy
      annotations:
        # Roll pods on env / secret changes. Pre-cutover this also
        # depended on a sites ConfigMap (fsnotify hot-reload of
        # sites.yaml). Post-cutover registry state lives in Valkey;
        # artemis subscribes to `registry.changed` for cache
        # invalidation, so chart-time rolls are env-only.
        checksum/config-env:  {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret-env:  {{ include (print $.Template.BasePath "/secret-env.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "artemis.selectorLabels" . | nindent 20 }}
      containers:
        - name: artemis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-env
            - secretRef:
                name: {{ .Release.Name }}-env-secret
          volumeMounts:
            # Writable tmp for read-only-root-fs Go binary scratch.
            - name: tmp
              mountPath: /tmp
          startupProbe:
            # Gates liveness/readiness until the HTTP server is up.
            # Boot blocks on the PG connect retry window (45s default,
            # PG_CONNECT_RETRY_WINDOW) + migrations + registry import +
            # two sequential Valkey boot-connect retry windows (store +
            # teamcache, 5s each, VALKEY_CONNECT_RETRY_WINDOW); worst-case
            # ~95s. failureThreshold*periodSeconds must exceed that or the
            # liveness probe kills the pod mid-retry, re-creating the
            # Sentry boot-race fatal it exists to absorb (dossier T32).
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          livenessProbe:
            # /healthz is the unconditional liveness probe — no upstream
            # calls, can never go red on a Valkey/R2 outage.
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            # /readyz pings Valkey + HEADs R2; pods are removed from the
            # Service endpoints when either upstream is unreachable.
            # Sequential probe budget = 2 × 3s; failureThreshold gives
            # ~30s grace before the pod is taken out of rotation.
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 7
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
