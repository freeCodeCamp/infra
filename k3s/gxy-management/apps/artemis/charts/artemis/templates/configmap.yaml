apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-env
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
data:
  R2_BUCKET:                    {{ required ".Values.env.R2_BUCKET is required" .Values.env.R2_BUCKET | quote }}
  GH_ORG:                       {{ required ".Values.env.GH_ORG is required" .Values.env.GH_ORG | quote }}
  GH_API_BASE:                  {{ required ".Values.env.GH_API_BASE is required" .Values.env.GH_API_BASE | quote }}
  VALKEY_ADDR:                  {{ required ".Values.env.VALKEY_ADDR is required (cross-namespace cluster DNS to the valkey chart Service)" .Values.env.VALKEY_ADDR | quote }}
  REGISTRY_AUTHZ_TEAM:          {{ required ".Values.env.REGISTRY_AUTHZ_TEAM is required (staff-team slug for /api/site/register, PATCH, DELETE)" .Values.env.REGISTRY_AUTHZ_TEAM | quote }}
  JWT_TTL_SECONDS:              {{ required ".Values.env.JWT_TTL_SECONDS is required" .Values.env.JWT_TTL_SECONDS | quote }}
  GH_MEMBERSHIP_CACHE_TTL:      {{ required ".Values.env.GH_MEMBERSHIP_CACHE_TTL is required" .Values.env.GH_MEMBERSHIP_CACHE_TTL | quote }}
  ALIAS_PRODUCTION_KEY_FORMAT:  {{ required ".Values.env.ALIAS_PRODUCTION_KEY_FORMAT is required" .Values.env.ALIAS_PRODUCTION_KEY_FORMAT | quote }}
  ALIAS_PREVIEW_KEY_FORMAT:     {{ required ".Values.env.ALIAS_PREVIEW_KEY_FORMAT is required" .Values.env.ALIAS_PREVIEW_KEY_FORMAT | quote }}
  DEPLOY_PREFIX_FORMAT:         {{ required ".Values.env.DEPLOY_PREFIX_FORMAT is required" .Values.env.DEPLOY_PREFIX_FORMAT | quote }}
  LOG_LEVEL:                    {{ default "info" .Values.env.LOG_LEVEL | quote }}
  # Repo-creation feature (ADR-016 §2026-05-29 amendment, /api/repo*).
  # Feature gates server-side on Apollo-11 GH App credentials in the
  # sops envelope (secretEnv.GH_APP_*); when absent the routes are not
  # mounted. These three are non-secret config and ship with defaults.
  GH_REPO_ORG:                  {{ default "freeCodeCamp-Universe" .Values.env.GH_REPO_ORG | quote }}
  REPO_CREATE_AUTHZ_TEAM:       {{ default "staff" .Values.env.REPO_CREATE_AUTHZ_TEAM | quote }}
  REPO_APPROVE_AUTHZ_TEAM:      {{ default "apollo-11-approvers" .Values.env.REPO_APPROVE_AUTHZ_TEAM | quote }}
  ENVIRONMENT:                  {{ default "development" .Values.env.ENVIRONMENT | quote }}
  SENTRY_TRACES_SAMPLE_RATE:    {{ default "0.2" .Values.env.SENTRY_TRACES_SAMPLE_RATE | quote }}
  {{- if .Values.postgres.enabled }}
  HATCHET_ADDR:                 {{ required ".Values.env.HATCHET_ADDR is required when postgres is enabled" .Values.env.HATCHET_ADDR | quote }}
  CLEANUP_BLAST_CAP:            {{ default "0" .Values.env.CLEANUP_BLAST_CAP | quote }}
  CLEANUP_DRY_RUN:              {{ default "false" .Values.env.CLEANUP_DRY_RUN | quote }}
  {{- end }}
