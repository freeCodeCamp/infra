apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-env
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
data:
  R2_BUCKET:                {{ required ".Values.env.R2_BUCKET is required" .Values.env.R2_BUCKET | quote }}
  GH_ORG:                   {{ required ".Values.env.GH_ORG is required" .Values.env.GH_ORG | quote }}
  GH_API_BASE:              {{ required ".Values.env.GH_API_BASE is required" .Values.env.GH_API_BASE | quote }}
  SITES_YAML_PATH:          {{ required ".Values.env.SITES_YAML_PATH is required" .Values.env.SITES_YAML_PATH | quote }}
  JWT_TTL_SECONDS:          {{ required ".Values.env.JWT_TTL_SECONDS is required" .Values.env.JWT_TTL_SECONDS | quote }}
  GH_MEMBERSHIP_CACHE_TTL:  {{ required ".Values.env.GH_MEMBERSHIP_CACHE_TTL is required" .Values.env.GH_MEMBERSHIP_CACHE_TTL | quote }}
  ALIAS_PRODUCTION:         {{ required ".Values.env.ALIAS_PRODUCTION is required" .Values.env.ALIAS_PRODUCTION | quote }}
  ALIAS_PREVIEW:            {{ required ".Values.env.ALIAS_PREVIEW is required" .Values.env.ALIAS_PREVIEW | quote }}
  DEPLOY_PREFIX_FORMAT:     {{ required ".Values.env.DEPLOY_PREFIX_FORMAT is required" .Values.env.DEPLOY_PREFIX_FORMAT | quote }}
  LOG_LEVEL:                {{ default "info" .Values.env.LOG_LEVEL | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-sites
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
data:
  # Loaded into Helm via `--set-file sites=$ARTEMIS_REPO/config/sites.yaml`
  # by the artemis-deploy recipe. Hot-reloaded by artemis svc via
  # fsnotify on ConfigMap update — no pod restart per ADR-016.
  sites.yaml: |-
    {{- required ".Values.sites is empty — pass via `--set-file sites=<path>` (see deploy-artemis-service runbook)" .Values.sites | nindent 4 }}
