apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
    app.kubernetes.io/component: deploy-proxy
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "artemis.selectorLabels" . | nindent 4 }}
    # Component scope required: bare selectorLabels also match the
    # postgres STS pod + backup Job pods (named-port resolution keeps
    # them out of endpoints, but kubectl port-forward svc/ resolves to
    # the wrong pod).
    app.kubernetes.io/component: deploy-proxy
