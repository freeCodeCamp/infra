apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
spec:
  gatewayClassName: traefik
  # CF zone `freecode.camp` is on Flexible SSL (matches cassiopeia
  # caddy precedent — k3s/gxy-cassiopeia/apps/caddy/charts/caddy/templates/gateway.yaml).
  # CF Edge terminates TLS with the Universal SSL cert; CF→origin is
  # plain HTTP. No origin cert at this layer.
  listeners:
    - name: web
      protocol: HTTP
      port: 80
      hostname: {{ required ".Values.gateway.hostname is required" .Values.gateway.hostname }}
      allowedRoutes:
        namespaces:
          from: Same
