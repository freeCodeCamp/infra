# HTTP → HTTPS redirect (matches windmill / zot / argocd pattern).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-http-redirect
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Release.Name }}-gateway
      sectionName: web
  hostnames:
    - {{ required ".Values.gateway.hostname is required" .Values.gateway.hostname | quote }}
  rules:
    - filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Values.middlewares.redirectHttps }}
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
---
# Main artemis route — websecure listener → artemis Service.
# Filter chain: rate-limit (chart-internal Middleware) → secure-headers (cluster-shared).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-route
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Release.Name }}-gateway
      sectionName: websecure
  hostnames:
    - {{ required ".Values.gateway.hostname is required" .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Release.Name }}-ratelimit
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Values.middlewares.secureHeaders }}
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
