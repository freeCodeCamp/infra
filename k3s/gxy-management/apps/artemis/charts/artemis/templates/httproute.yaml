# Single HTTPRoute on the web (HTTP :80) listener — CF Edge terminates
# TLS upstream (Universal SSL on the freecode.camp zone). No
# http-redirect route needed (and it would be wrong — CF requests
# always arrive on :80 from CF→origin under Flexible SSL; redirecting
# them would loop).
#
# Filter chain: rate-limit (chart-internal Middleware) → secure-headers (cluster-shared).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-route
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Release.Name }}-gateway
      sectionName: web
  hostnames:
    - {{ required ".Values.gateway.hostname is required" .Values.gateway.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Release.Name }}-ratelimit
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Values.middlewares.secureHeaders }}
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
