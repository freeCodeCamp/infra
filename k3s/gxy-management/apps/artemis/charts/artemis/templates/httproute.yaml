# Single HTTPRoute on the web (HTTP :80) listener — CF Edge terminates
# TLS upstream (Universal SSL on the freecode.camp zone). No
# http-redirect route needed (and it would be wrong — CF requests
# always arrive on :80 from CF→origin under Flexible SSL; redirecting
# them would loop).
#
# Filter chain (catch-all): rate-limit → body-limit → secure-headers.
# /api/deploy is exempt from body-limit — Traefik buffering reads the
# whole body before forwarding, which would break the streaming
# PUT /upload; deploy bodies are capped in-app via MaxBytesReader.
#
# Operator-only paths (`/metrics`, `/readyz`) are routed first to a
# rewritten not-found path so external callers via the public Gateway
# see chi's 404 instead of the prom exposition or registry-health
# response. In-cluster scrape (Prometheus → Service:port) and k8s
# readinessProbe (kubelet → pod IP) both bypass this HTTPRoute and so
# continue to reach the real handlers. `/healthz` stays public — it
# carries no labels and is the documented external liveness probe.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-route
  labels:
    {{- include "artemis.labels" . | nindent 4 }}
    app.kubernetes.io/component: deploy-proxy
spec:
  parentRefs:
    - name: {{ .Release.Name }}-gateway
      sectionName: web
  hostnames:
    - {{ required ".Values.gateway.hostname is required" .Values.gateway.hostname | quote }}
  rules:
    # Public-block: rewrite /metrics + /readyz to an unrouted path.
    # chi-router returns 404 for unknown paths so callers see a clean
    # 404, not a 200 with operator-only payload. Must come BEFORE the
    # catch-all PathPrefix `/` rule — Gateway API rule precedence is
    # most-specific-first and PathPrefix `/` would otherwise win on
    # everything.
    - matches:
        - path:
            type: PathPrefix
            value: /metrics
        - path:
            type: PathPrefix
            value: /readyz
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /_artemis_blocked_path
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}

    - matches:
        - path:
            type: PathPrefix
            value: /api/deploy
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Release.Name }}-ratelimit
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Values.middlewares.secureHeaders }}
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}

    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Release.Name }}-ratelimit
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Release.Name }}-bodylimit
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: {{ .Values.middlewares.secureHeaders }}
      backendRefs:
        - name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
