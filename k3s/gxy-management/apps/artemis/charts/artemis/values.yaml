# Default values for the artemis chart.
# Production overlay at ../../values.production.yaml.
# Secret credentials overlay at (sops) infra-secrets/k3s/gxy-management/artemis.values.yaml.enc.
# Consumed by `just release gxy-management artemis`.
#
# Layer order (lowest → highest precedence):
#   1. THIS FILE (chart defaults)
#   2. apps/artemis/values.production.yaml (production overlay — image pin, replicas, non-secret env)
#   3. infra-secrets/k3s/gxy-management/artemis.values.yaml.enc (sops sealed — secret env only)

namespace: artemis

# ---------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------
# Per Universe RUN-residency rule: artemis pillar pulls from
# ghcr.io/freecodecamp/artemis direct. NEVER through zot.management
# (zot lives on this same galaxy → chicken-egg on cluster wipe). See
# Universe/spike/field-notes/infra.md §2026-04-27.
image:
  repository: ghcr.io/freecodecamp/artemis
  tag: "dev"
  pullPolicy: IfNotPresent

replicaCount: 1

# ---------------------------------------------------------------------
# Workload sizing
# ---------------------------------------------------------------------
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# ---------------------------------------------------------------------
# Pod & container security context (PSS baseline-compliant; artemis
# namespace runs PSS baseline — no privileged escalation needed).
# ---------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

# ---------------------------------------------------------------------
# Application env (non-secret) — defaults per artemis.env.sample.
# Values flow into the ConfigMap mounted into the pod via envFrom.
# Secret env (R2 keys, GH_CLIENT_ID, JWT_SIGNING_KEY, VALKEY_PASSWORD)
# live under `secretEnv:` and come from the sops overlay.
# ---------------------------------------------------------------------
env:
  R2_BUCKET: "universe-static-apps-01"
  GH_ORG: "freeCodeCamp-Universe"
  GH_API_BASE: "https://api.github.com"
  # Valkey registry — required by artemis since the `sites_yaml` backend
  # was retired in artemis@f115198. The address is in-cluster
  # (cross-namespace) cluster DNS; Valkey chart deploys to its own
  # `valkey` namespace per `apps/valkey/charts/valkey/values.yaml`.
  VALKEY_ADDR: "valkey.valkey.svc.cluster.local:6379"
  # Team slug whose members may call the registry write endpoints
  # (`POST /api/site/register`, `PATCH /api/site/{slug}`,
  # `DELETE /api/site/{slug}`). Read endpoint (`GET /api/sites`) is
  # open to any GitHub bearer.
  REGISTRY_AUTHZ_TEAM: "staff"
  JWT_TTL_SECONDS: "900" # 15 min, per ADR-016 amend 2026-04-26
  GH_MEMBERSHIP_CACHE_TTL: "300"
  # Format placeholders are artemis-native: <site> per-site, <ts>-<sha>
  # per-deploy. Validated by artemis at startup
  # (internal/handler/deploykey.go).
  ALIAS_PRODUCTION_KEY_FORMAT: "<site>.freecode.camp/production"
  ALIAS_PREVIEW_KEY_FORMAT: "<site>.freecode.camp/preview"
  DEPLOY_PREFIX_FORMAT: "<site>.freecode.camp/deploys/<ts>-<sha>/"
  LOG_LEVEL: "info"
  # Repo-creation feature (ADR-016 §2026-05-29 amendment, /api/repo*).
  # Feature gates server-side on the Apollo-11 GH App creds (secretEnv
  # below). These three are non-secret config; defaults match artemis
  # config defaults so the chart is no-op for deploy-only deployments.
  GH_REPO_ORG: "freeCodeCamp-Universe"
  REPO_CREATE_AUTHZ_TEAM: "staff"
  REPO_APPROVE_AUTHZ_TEAM: "apollo-11-approvers"
  ENVIRONMENT: "development"
  SENTRY_TRACES_SAMPLE_RATE: "0.2"
  # Durable-execution (rendered only when postgres.enabled). CLEANUP_BLAST_CAP
  # is the per-run tombstone ceiling (0 = uncapped); CLEANUP_DRY_RUN plans
  # without deleting — set true for the cutover dry-run, then false.
  CLEANUP_BLAST_CAP: "0"
  CLEANUP_DRY_RUN: "false"
  # HATCHET_ADDR is intentionally EMPTY by default — the worker + relay
  # boot only when it is set. Stage-1 deploy (postgres.enabled, this blank)
  # brings up PG + runs migrations; set this in values.production.yaml to
  # the live engine gRPC address (e.g. hatchet-engine.artemis.svc.cluster.local:7077)
  # once the Hatchet engine is deployed, then re-release to start the worker.
  HATCHET_ADDR: ""

# Required secret env keys — populated by sops overlay
# (infra-secrets/k3s/gxy-management/artemis.values.yaml.enc).
# Listed here as null so chart fail-fasts via `required` template
# helpers if the overlay is missing or incomplete.
#
# VALKEY_PASSWORD MUST match the value used by the valkey chart's
# secretEnv.VALKEY_PASSWORD (single shared secret on this galaxy).
# Mint procedure: same envelope-level rotate; see
# `docs/flight-manuals/gxy-management.md §C-valkey`.
secretEnv:
  R2_ENDPOINT: null
  R2_ACCESS_KEY_ID: null
  R2_SECRET_ACCESS_KEY: null
  GH_CLIENT_ID: null
  JWT_SIGNING_KEY: null
  VALKEY_PASSWORD: null
  # Durable-execution (GC) secrets — required only when postgres.enabled.
  # POSTGRES_PASSWORD = superuser; ARTEMIS_DB_PASSWORD / HATCHET_DB_PASSWORD
  # = the two isolated tenant roles on the shared instance. DATABASE_URL is
  # auto-constructed from ARTEMIS_DB_PASSWORD unless set explicitly (external
  # PG). HATCHET_CLIENT_TOKEN is minted from the deployed Hatchet engine and
  # flips artemis into GC mode.
  POSTGRES_PASSWORD: null
  ARTEMIS_DB_PASSWORD: null
  HATCHET_DB_PASSWORD: null
  DATABASE_URL: null
  HATCHET_CLIENT_TOKEN: null
  # Apollo-11 GH App credentials — leave null to keep /api/repo*
  # feature OFF. Provide all three in the sops envelope to enable.
  # Partial config fails artemis validate() at boot.
  GH_APP_ID: null
  GH_APP_INSTALLATION_ID: null
  GH_APP_PRIVATE_KEY: null
  SENTRY_DSN: null

# ---------------------------------------------------------------------
# Gateway / HTTPRoute (Traefik gatewayClassName) — public surface
# `uploads.freecode.camp`. CF zone `freecode.camp` is on Flexible
# SSL (CF Edge terminates HTTPS, CF→origin is plain HTTP — matches
# the cassiopeia caddy precedent on the same zone). No TLS terminator
# at the k8s layer; HTTP :80 listener only.
# ---------------------------------------------------------------------
gateway:
  hostname: "uploads.freecode.camp"

# Traefik middleware reference (cluster-installed — see
# k3s/gxy-management/cluster/traefik/middlewares.yaml). Name matches
# windmill / zot / argocd usage for parity.
middlewares:
  secureHeaders: secure-headers

# ---------------------------------------------------------------------
# Rate limit (Traefik Middleware — chart-internal). Per-source-IP
# limit (CF X-Forwarded-For depth=1). Production overlay tunes.
# ---------------------------------------------------------------------
rateLimit:
  average: 20
  burst: 60
  period: "1s"

# ---------------------------------------------------------------------
# Request body limit (Traefik buffering Middleware — chart-internal).
# Applied to the catch-all route only; /api/deploy is exempt so the
# streaming upload (PUT /upload, up to 100 MiB) is never buffered.
# In-app MaxBytesReader caps stay the primary guard; this is an edge
# backstop for the small-JSON endpoints (register/promote/repo/...).
# ---------------------------------------------------------------------
bodyLimit:
  maxRequestBodyBytes: 1048576

# ---------------------------------------------------------------------
# NetworkPolicy
# ---------------------------------------------------------------------
networkPolicy:
  enabled: true

# ---------------------------------------------------------------------
# Bundled Postgres (M1 — durable-execution substrate). One single-node
# postgres:16-alpine StatefulSet, SHARED by artemis + the Hatchet engine
# with tenant isolation (separate databases + login roles, least-priv).
# Disabled by default so deploy-only deployments stay stateless; the
# production overlay flips enabled=true to turn on GC. HA is the
# backup/restore floor (ADR-019), not replication — see artemis-backup.
# ---------------------------------------------------------------------
# Hatchet engine (operator-deployed via hatchet-stack into this namespace,
# sharing the bundled PG `hatchet` tenant). grpcPort MUST match the
# engine Service's gRPC port AND the port in env.HATCHET_ADDR — verify
# against the deployed chart (hatchet-stack has shipped both :7070 and
# :7077 across versions). Used by the egress NetworkPolicy.
hatchet:
  grpcPort: 7077

postgres:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  storage: 10Gi
  storageClassName: "local-path"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

# ---------------------------------------------------------------------
# Backup CronJob (ADR-019 stateful floor). Logical pg_dumpall of the
# shared instance (both tenant DBs: artemis + hatchet) gzipped and
# pushed to R2, with a 7-day prune. Gated on postgres.enabled AND
# backup.enabled so deploy-only (stateless) deployments stay no-op.
# REUSES the artemis env secret ({{ .Release.Name }}-env-secret) for
# POSTGRES_PASSWORD + R2 creds -- no separate backup secret is minted.
# Mirrors the windmill precedent (manifests/base/backup-cronjob.yaml)
# on schedule, history limits, concurrency, and the postgres-rclone
# image.
# ---------------------------------------------------------------------
backup:
  enabled: false
  # postgres-rclone image -- pg_dumpall + rclone in one run-once-and-die
  # rootfs. Digest-pinned; build is workflow_dispatch-only on the
  # postgres-rclone repo (see docs/runbooks/06-windmill-pg-backup.md).
  image: ghcr.io/freecodecamp/postgres-rclone@sha256:294e8b276ee23b44f6a16bcef6239f55e4e93ecad7372af7a079650f8a6583e5
  schedule: "0 2 * * *"
  # rclone --min-age threshold for the prune step (objects older than
  # this under the artemis/<galaxy>/ R2 prefix are deleted post-upload).
  retention: 7d
  # Galaxy literal -- namespaces the R2 object prefix (artemis/<galaxy>/)
  # so a sibling galaxy can share the bucket without key collisions.
  galaxy: gxy-management
  activeDeadlineSeconds: 1800
  # emptyDir tmpfs sizeLimit for the /tmp dump scratch. Raise if the
  # gzipped logical dump approaches this ceiling.
  tmpSizeLimit: 512Mi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
