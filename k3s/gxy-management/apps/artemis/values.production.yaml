# Production overlay for the artemis chart on gxy-management.
# Loaded by `just release gxy-management artemis` between chart
# defaults and the sops sealed overlay so the layering is:
#
#   chart values.yaml  <  THIS FILE  <  infra-secrets/k3s/gxy-management/artemis.values.yaml.enc
#
# Secret credentials live in the sops overlay only. No TLS PEM —
# CF zone `freecode.camp` is on Flexible SSL (CF→origin HTTP);
# matches cassiopeia caddy precedent on the same zone.
# Anything in this file is git-tracked and may be inspected publicly.

replicaCount: 3

image:
  repository: ghcr.io/freecodecamp/artemis
  # Pin = bare-semver tag + digest. Digest is load-bearing (OCI: when
  # both present, digest wins → containerd pulls immutable). Tag is for
  # `helm list` / `kubectl describe pod` readability. Bare-semver (no
  # `v`) follows docker/metadata-action `type=semver,pattern={{version}}`
  # default. Build pipeline + bump procedure: artemis repo RELEASING.md.
  # release: sha-916247f (PRE-MERGE ephemeral pin for P4.5 empirical verify.
  # Source = artemis feat/readyz @ 916247feb50c9511d5969ae140779cf3d79f2728.
  # Image built locally via `docker buildx --platform linux/amd64 --push`
  # 2026-05-18; matches docker/metadata-action `type=sha,format=long` naming
  # so the GHCR object lines up byte-for-byte with what CI will emit when
  # the feat/readyz changes land on main. Re-pin to canonical `0.2.1@<digest>`
  # post-merge once tag `v0.2.1` fires `docker-ghcr.yml` on main.)
  tag: "sha-916247feb50c9511d5969ae140779cf3d79f2728@sha256:0d7d87e9dc49a8c456647dea1bab28622fc6390b428f45a63848d96c57994dbc"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# Production env defaults (non-secret). Match artemis.env.sample.
env:
  R2_BUCKET: "universe-static-apps-01"
  GH_ORG: "freeCodeCamp"
  GH_API_BASE: "https://api.github.com"
  # Valkey registry (replaces SITES_YAML_PATH; sites_yaml backend
  # retired in artemis@f115198). Cross-namespace cluster DNS:
  #   <svc>.<ns>.svc.cluster.local — service named `valkey` in
  #   namespace `valkey`. AUTH password rides in via the secretEnv
  #   sops overlay (VALKEY_PASSWORD).
  VALKEY_ADDR: "valkey.valkey.svc.cluster.local:6379"
  REGISTRY_AUTHZ_TEAM: "staff"
  JWT_TTL_SECONDS: "900"
  GH_MEMBERSHIP_CACHE_TTL: "300"
  # Site key in R2 = `<site>.freecode.camp` (full FQDN). Matches the
  # cassiopeia caddy r2_alias module's parseSiteAndAlias which returns
  # site = `<sitePrefix> + .<rootDomain>` (host.go). Without the suffix
  # caddy reads `test.freecode.camp/preview` while artemis writes
  # `test/preview` → 404. Verified 2026-04-27 against
  # docker/images/caddy-s3/modules/r2alias/host.go.
  ALIAS_PRODUCTION_KEY_FORMAT: "<site>.freecode.camp/production"
  ALIAS_PREVIEW_KEY_FORMAT: "<site>.freecode.camp/preview"
  DEPLOY_PREFIX_FORMAT: "<site>.freecode.camp/deploys/<ts>-<sha>/"
  LOG_LEVEL: "info"

# Rate-limit tunables — Traefik Middleware (chart-internal). Per
# source IP (CF-rewritten X-Forwarded-For depth=1).
rateLimit:
  average: 20
  burst: 60
  period: "1s"

gateway:
  hostname: "uploads.freecode.camp"

networkPolicy:
  enabled: true
