# Production overlay for the artemis chart on gxy-management.
# Loaded by `just release gxy-management artemis` between chart
# defaults and the sops sealed overlay so the layering is:
#
#   chart values.yaml  <  THIS FILE  <  infra-secrets/k3s/gxy-management/artemis.values.yaml.enc
#
# Secret credentials live in the sops overlay only. No TLS PEM —
# CF zone `freecode.camp` is on Flexible SSL (CF→origin HTTP);
# matches cassiopeia caddy precedent on the same zone.
# Anything in this file is git-tracked and may be inspected publicly.

replicaCount: 3

image:
  repository: ghcr.io/freecodecamp/artemis
  # release: 1.5.0
  tag: "1.5.0@sha256:d474c761586c4efbb208d0fbf073bb58f1b5ceea61c57138ef1525b140105496"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# Production env defaults (non-secret). Match artemis.env.sample.
env:
  R2_BUCKET: "universe-static-apps-01"
  GH_ORG: "freeCodeCamp-Universe"
  GH_API_BASE: "https://api.github.com"
  # Valkey registry (replaces SITES_YAML_PATH; sites_yaml backend
  # retired in artemis@f115198). Cross-namespace cluster DNS:
  #   <svc>.<ns>.svc.cluster.local — service named `valkey` in
  #   namespace `valkey`. AUTH password rides in via the secretEnv
  #   sops overlay (VALKEY_PASSWORD).
  VALKEY_ADDR: "valkey.valkey.svc.cluster.local:6379"
  REGISTRY_AUTHZ_TEAM: "staff"
  REPO_APPROVE_AUTHZ_TEAM: "gh-artemis-approvers"
  JWT_TTL_SECONDS: "900"
  GH_MEMBERSHIP_CACHE_TTL: "300"
  # Site key in R2 = `<site>.freecode.camp` (full FQDN). Matches the
  # cassiopeia caddy r2_alias module's parseSiteAndAlias which returns
  # site = `<sitePrefix> + .<rootDomain>` (host.go). Without the suffix
  # caddy reads `test.freecode.camp/preview` while artemis writes
  # `test/preview` → 404. Verified 2026-04-27 against
  # docker/images/caddy-s3/modules/r2alias/host.go.
  ALIAS_PRODUCTION_KEY_FORMAT: "<site>.freecode.camp/production"
  ALIAS_PREVIEW_KEY_FORMAT: "<site>.freecode.camp/preview"
  DEPLOY_PREFIX_FORMAT: "<site>.freecode.camp/deploys/<ts>-<sha>/"
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  SENTRY_TRACES_SAMPLE_RATE: "0.5"
  # Stage-2 flip (2026-06-06): Hatchet engine live (hatchet chart,
  # same namespace). Non-empty value boots the worker + outbox relay.
  # Port 7077 = engine SERVER_GRPC_PORT + Service port; the configmap
  # also emits HATCHET_CLIENT_TLS_STRATEGY=none alongside (in-cluster
  # plaintext gRPC, SERVER_GRPC_INSECURE on the engine side).
  HATCHET_ADDR: "hatchet-engine.artemis.svc.cluster.local:7077"
  # M4-live flip (2026-06-06): GC moves bytes for real. Tombstoned
  # deploys sit in _trash/ for CLEANUP_RECOVERY_DAYS (7d default)
  # before the purge cron hard-deletes — reversible window. Blast cap
  # bounds any single gc-site run: a backlog larger than the cap reaps
  # the oldest CLEANUP_BLAST_CAP deploys (moves bytes to _trash/ +
  # tombstones) and reports outcome=capped — PARTIAL progress, not a
  # no-op (artemis 86d0e75, v1.2.0).
  CLEANUP_DRY_RUN: "false"
  CLEANUP_BLAST_CAP: "10"

# Rate-limit tunables — Traefik Middleware (chart-internal). Per
# source IP (CF-rewritten X-Forwarded-For depth=1).
rateLimit:
  average: 20
  burst: 60
  period: "1s"

gateway:
  hostname: "uploads.freecode.camp"

networkPolicy:
  enabled: true

# Bundled shared Postgres (retention-GC substrate). Enabling flips artemis
# out of deploy-only; worker + relay boot because env.HATCHET_ADDR is set
# (stage-2 flip 2026-06-06). The image.tag above must be an artemis build
# that contains the durable-exec code.
postgres:
  enabled: true

# Nightly logical backup of the shared PG instance (both tenant DBs)
# to R2 with a 7-day prune. Reuses the artemis env secret for the PG
# superuser password + R2 creds. See chart values.yaml `backup:` block.
backup:
  enabled: true
