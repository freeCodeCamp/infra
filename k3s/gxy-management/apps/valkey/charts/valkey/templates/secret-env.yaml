{{- $password := required "secretEnv.VALKEY_PASSWORD must be set via the sops overlay (infra-secrets/k3s/gxy-management/valkey.values.yaml.enc)" .Values.secretEnv.VALKEY_PASSWORD -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "valkey.fullname" . }}-env
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
type: Opaque
stringData:
  VALKEY_PASSWORD: {{ $password | quote }}
