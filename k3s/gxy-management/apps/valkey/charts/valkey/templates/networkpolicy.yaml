{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "valkey.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "valkey.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
  egress:
    # DNS resolution (kube-dns / coredns).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
