# Pod Security Standards admission configuration
# Copied to /var/lib/rancher/k3s/server/pss.yaml by Ansible
#
# - baseline: enforced (blocks privileged containers, host networking, hostPath)
# - restricted: audit + warn only (logs violations, does not block)
# - System namespaces exempted (Cilium, Windmill workers, and Tailscale need elevated privileges)
apiVersion: apiserver.config.k8s.io/v1
kind: AdmissionConfiguration
plugins:
  - name: PodSecurity
    configuration:
      apiVersion: pod-security.admission.config.k8s.io/v1
      kind: PodSecurityConfiguration
      defaults:
        enforce: "baseline"
        enforce-version: "latest"
        audit: "restricted"
        audit-version: "latest"
        warn: "restricted"
        warn-version: "latest"
      exemptions:
        namespaces:
          - kube-system
          - cilium
          - windmill
          - tailscale
