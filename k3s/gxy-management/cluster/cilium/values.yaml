cluster:
  name: "gxy-management"
  id: 1

# Set at deploy time via Ansible --set flags
# k8sServiceHost: <VPC IP of first server node>
k8sServicePort: "6443"

kubeProxyReplacement: true

ipam:
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.1.0.0/16"

operator:
  replicas: 1

hubble:
  enabled: true
  tls:
    auto:
      method: cronJob
  relay:
    enabled: true
  ui:
    enabled: false

gatewayAPI:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
