# Traefik HelmChartConfig for gxy-management galaxy
# Reference: https://docs.k3s.io/networking/networking-services#customizing-the-traefik-helm-chart
#
# This file is copied to /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
# by Ansible play-k3s--galaxy.yml

apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    # Enable Gateway API provider
    providers:
      kubernetesGateway:
        enabled: true

    # Disable built-in Gateway (we define per-app Gateways in manifests)
    gateway:
      enabled: false

    # DaemonSet + hostNetwork: Traefik binds 80/443 directly on every node
    deployment:
      kind: DaemonSet
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0

    hostNetwork: true

    service:
      type: ClusterIP

    ports:
      web:
        port: 80
        exposedPort: 80
      websecure:
        port: 443
        exposedPort: 443
        tls:
          enabled: true
        transport:
          respondingTimeouts:
            readTimeout: "0s"
            writeTimeout: "0s"
            idleTimeout: "180s"

    # Logging
    logs:
      general:
        level: INFO
      access:
        enabled: true

    # Security context
    securityContext:
      capabilities:
        drop: [ALL]
        add: [NET_BIND_SERVICE]
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      runAsNonRoot: false
      runAsUser: 0

    podSecurityContext:
      fsGroup: 65532
      runAsGroup: 65532
      seccompProfile:
        type: RuntimeDefault
