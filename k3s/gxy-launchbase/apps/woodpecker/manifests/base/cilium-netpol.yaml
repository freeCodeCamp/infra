---
# Egress allow-list for the woodpecker namespace (server + agents +
# agent-spawned pipeline pods):
#   - kube-apiserver             — CNPG instance manager fetches own Cluster CR
#   - api.github.com:443         — OAuth forge + git fetch
#   - *.r2.cloudflarestorage.com — deploy artifact push
#   - api.cloudflare.com:443     — cache-purge step
#   - *.digitaloceanspaces.com   — CNPG barman-cloud WAL/base backup push
#   - kube-dns UDP/53            — name resolution
#   - intra-namespace            — server ↔ agent ↔ postgres
# All other egress dropped.

apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: woodpecker-egress
  namespace: woodpecker
spec:
  endpointSelector: {}
  egress:
    # CNPG instance manager + every controller-style workload polls the
    # apiserver. `kube-apiserver` is a Cilium-managed entity selector
    # that resolves to the apiserver IPs (works with kube-proxy
    # replacement). Without this rule, initdb pods deadlock on
    # `wait-for-get-cluster` and the Cluster never reaches Ready.
    - toEntities:
        - kube-apiserver
    - toFQDNs:
        - matchName: "api.github.com"
        - matchPattern: "*.r2.cloudflarestorage.com"
        - matchName: "api.cloudflare.com"
        - matchPattern: "*.digitaloceanspaces.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": woodpecker
