---
# Egress allow-list for the woodpecker namespace (server + agents +
# agent-spawned pipeline pods):
#   - kube-apiserver             — CNPG instance manager fetches own Cluster CR
#   - api.github.com:443         — Woodpecker forge REST
#   - github.com + *.githubusercontent.com + codeload.github.com:443
#                                — OAuth access_token + git fetch/archive
#   - *.r2.cloudflarestorage.com — deploy artifact push
#   - api.cloudflare.com:443     — cache-purge step
#   - *.digitaloceanspaces.com   — CNPG barman-cloud WAL/base backup push
#   - kube-dns UDP/53            — name resolution
#   - intra-namespace            — server ↔ agent ↔ postgres
# All other egress dropped.

apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: woodpecker-egress
  namespace: woodpecker
spec:
  endpointSelector: {}
  egress:
    # CNPG instance manager + every controller-style workload polls the
    # apiserver. `kube-apiserver` is a Cilium-managed entity selector
    # that resolves to the apiserver IPs (works with kube-proxy
    # replacement). Without this rule, initdb pods deadlock on
    # `wait-for-get-cluster` and the Cluster never reaches Ready.
    - toEntities:
        - kube-apiserver
    - toFQDNs:
        - matchName: "api.github.com"
        # github.com hosts the OAuth access_token endpoint + git clone; it is
        # a different FQDN from api.github.com (different anycast IP set).
        - matchName: "github.com"
        - matchPattern: "*.githubusercontent.com"
        - matchName: "codeload.github.com"
        - matchPattern: "*.r2.cloudflarestorage.com"
        - matchName: "api.cloudflare.com"
        - matchPattern: "*.digitaloceanspaces.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Cilium populates `toFQDNs` selectors only when DNS queries are seen
    # by the Cilium DNS proxy, which requires an L7 `rules.dns` block on a
    # DNS egress rule. Matches narrowed to the exact FQDNs the server and
    # agents dial — wildcard `"*"` would expose every hostname to the proxy.
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchName: "api.github.com"
              - matchName: "github.com"
              - matchPattern: "*.githubusercontent.com"
              - matchName: "codeload.github.com"
              - matchPattern: "*.r2.cloudflarestorage.com"
              - matchName: "api.cloudflare.com"
              - matchPattern: "*.digitaloceanspaces.com"
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": woodpecker
