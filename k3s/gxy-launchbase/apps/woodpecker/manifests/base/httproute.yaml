---
# HTTPRoute for Woodpecker CI. Binds woodpecker.freecodecamp.net to the
# cluster's Traefik Gateway. The CF DNS A record pointing at the Traefik
# node IPs is provisioned separately; without it this route is inert but
# valid.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: woodpecker
  namespace: woodpecker
  labels:
    app.kubernetes.io/name: woodpecker
    app.kubernetes.io/part-of: woodpecker
spec:
  parentRefs:
    - name: woodpecker-gateway
      namespace: woodpecker
  hostnames:
    - "woodpecker.freecodecamp.net"
  rules:
    - backendRefs:
        - name: woodpecker-server
          # Chart's Service exposes port 80 (http) + 9000 (grpc).
          # HTTPRoute binds the http port; agents talk to :9000 intra-namespace.
          port: 80
