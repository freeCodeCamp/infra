---
# CNPG Cluster CR — Woodpecker postgres backend
# Spec: docs/rfc/gxy-cassiopeia.md §4.2.2 (D21)
#
# Topology:
#   - 2 instances (1 primary + 1 synchronous replica)
#   - PostgreSQL 16 (CNPG appVersion 1.29 default image line)
#   - synchronous_commit = remote_write (RFC §4.2.2)
#   - WAL archive to DO Spaces (net-freecodecamp-universe-backups)
#   - Backup retention 14 days → PITR window = 14 days
#
# Secrets:
#   - woodpecker-postgres-s3-backup (created by `just deploy gxy-launchbase woodpecker`
#     from infra-secrets/k3s/gxy-launchbase/woodpecker.secrets.env.enc; see SECRETS.md).
#
# The Cluster CR is applied via `kubectl apply -k manifests/base/` AFTER the
# CNPG operator is installed (helm-upgrade cnpg-system). Deploy order:
#   1. just helm-upgrade gxy-launchbase cnpg-system
#   2. kubectl -n cnpg-system rollout status deploy/cnpg-system-cloudnative-pg --timeout=3m
#   3. just deploy gxy-launchbase woodpecker    # includes this Cluster CR

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: woodpecker-postgres
  namespace: woodpecker
  labels:
    app.kubernetes.io/name: woodpecker-postgres
    app.kubernetes.io/part-of: woodpecker
    app.kubernetes.io/managed-by: cnpg-operator
spec:
  instances: 2

  # Pin PostgreSQL version via image tag. CNPG 1.29 (chart v0.28.0) recommends
  # the `-system-trixie` variant from the v1.29 image catalog. Upgrade is an
  # operator-guided process (rolling + PITR fallback) — see CNPG docs for
  # pg_upgrade flow. Bump via PR with a PITR drill run first.
  imageName: ghcr.io/cloudnative-pg/postgresql:16.10-system-trixie

  # Synchronous replication for durability (RFC §4.2.2). synchronous_commit =
  # remote_write means primary acks after WAL hits the replica's OS, not after
  # fsync — balances durability with latency.
  postgresql:
    synchronous:
      method: any
      number: 1
      maxStandbyNamesFromCluster: 1
    parameters:
      synchronous_commit: remote_write
      # Conservative defaults; tune after observing Woodpecker pipeline load.
      max_connections: "200"
      shared_buffers: 256MB
      effective_cache_size: 768MB
      work_mem: 4MB
      maintenance_work_mem: 128MB
      log_statement: ddl
      log_connections: "on"
      log_disconnections: "on"

  # Bootstrap: create an `app` database and user for Woodpecker. Credentials
  # are auto-generated by the operator and stored in
  # Secret/woodpecker-postgres-app (valueFrom.secretKeyRef in the Woodpecker
  # Helm values).
  bootstrap:
    initdb:
      database: woodpecker
      owner: woodpecker
      encoding: UTF8
      localeCType: C
      localeCollate: C

  # Storage per instance. 20Gi matches Woodpecker pipeline-history volume
  # projections at ~90-day retention + buffer. PVC uses the cluster's default
  # StorageClass (local-path on k3s until we provision distributed storage).
  storage:
    size: 20Gi

  # Resource envelope — ample headroom on a 3x s-4vcpu-8gb pool.
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

  # Anti-affinity: spread instances across nodes (we have 3 workers).
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required

  # Monitoring: enable ExternalMetrics endpoint; scraping is deferred to
  # gxy-backoffice's Prometheus (§10.2). Annotations left to the ServiceMonitor
  # once that lands.
  monitoring:
    enablePodMonitor: false

  # Backup configuration — barman-cloud to DO Spaces (S3-compatible).
  # Credentials supplied via Secret/woodpecker-postgres-s3-backup.
  backup:
    barmanObjectStore:
      destinationPath: s3://net-freecodecamp-universe-backups/cnpg/gxy-launchbase/woodpecker
      endpointURL: https://fra1.digitaloceanspaces.com
      s3Credentials:
        accessKeyId:
          name: woodpecker-postgres-s3-backup
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: woodpecker-postgres-s3-backup
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
        maxParallel: 4
      data:
        compression: gzip
        jobs: 2
    retentionPolicy: "14d"

  # Scheduled base backup — every 6h aligns with etcd snapshot cadence.
  # A companion ScheduledBackup CR is defined below to drive this.
