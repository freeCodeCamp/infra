---
# Woodpecker CI Helm values — gxy-launchbase
# Chart: woodpecker/woodpecker (appVersion 3.13.0, chart 3.5.1)
# Repo:  https://woodpecker-ci.org/
# Spec:  docs/rfc/gxy-cassiopeia.md §4.2 (D21, CRITICAL #1)
#
# T10 scope (post-review W3): chart + values + OAuth secret wiring.
# T32 appends: WOODPECKER_ADMIN, WOODPECKER_ORGS, and Cloudflare Access gate.
#
# Secrets sources:
#   - woodpecker-postgres-app    (generated by CNPG from T09 Cluster CR)
#   - woodpecker-env             (kustomize secretGenerator from .secrets.env)
#
# Apply with:
#   just helm-upgrade gxy-launchbase woodpecker
# (recipe auto-overlays infra-secrets/k3s/gxy-launchbase/woodpecker.values.yaml.enc
#  if present — used to override WOODPECKER_HOST or inject any secret env refs.)

# --- Server --------------------------------------------------------------
server:
  enabled: true

  image:
    registry: docker.io
    repository: woodpeckerci/woodpecker-server
    # Pin to app version 3.13.0 (chart 3.5.1's appVersion default) — ensures
    # the image tag never floats. Bump via PR with a changelog read.
    tag: "v3.13.0"
    pullPolicy: IfNotPresent

  statefulSet:
    replicaCount: 1
    revisionHistoryLimit: 5

  # Persistent storage for Woodpecker's internal state (pipeline config cache,
  # OAuth state). Authoritative DB is CNPG postgres; this volume is small.
  persistentVolume:
    enabled: true
    size: 5Gi
    mountPath: /var/lib/woodpecker

  # Woodpecker agent↔server shared secret (generated at deploy time, not committed).
  # The chart creates a default `woodpecker-default-agent-secret` if enabled;
  # for production we provide WOODPECKER_AGENT_SECRET explicitly via the `woodpecker-env`
  # Secret (via extraSecretNamesForEnvFrom below). Disable chart auto-generation so
  # the secret lifecycle is sops-owned, not Helm-owned.
  createAgentSecret: false

  extraSecretNamesForEnvFrom:
    # Populated by kustomize secretGenerator from .secrets.env (decrypted
    # from infra-secrets/k3s/gxy-launchbase/woodpecker.secrets.env.enc).
    # Must contain:
    #   WOODPECKER_SERVER_SECRET
    #   WOODPECKER_AGENT_SECRET
    #   WOODPECKER_GITHUB_CLIENT
    #   WOODPECKER_GITHUB_SECRET
    - woodpecker-env

  env:
    # Kubernetes backend (D21)
    WOODPECKER_BACKEND: kubernetes

    # Bounded pipeline concurrency. Matches RFC §4.2 "WOODPECKER_MAX_WORKFLOWS=2"
    # acceptance criterion. Quoted so Helm passes as string env var.
    WOODPECKER_MAX_WORKFLOWS: "2"

    # GitHub OAuth forge (§4.2.3)
    WOODPECKER_GITHUB: "true"
    WOODPECKER_GITHUB_URL: "https://github.com"
    # WOODPECKER_GITHUB_CLIENT and WOODPECKER_GITHUB_SECRET come from woodpecker-env.

    # External-facing URL. Corresponds to T32's DNS record; the HTTPRoute in
    # manifests/base/httproute.yaml binds this hostname to the server Service.
    WOODPECKER_HOST: "https://woodpecker.freecodecamp.net"

    # Tighten registration — only admin-approved users may log in after first-run.
    # WOODPECKER_ADMIN and WOODPECKER_ORGS are applied by T32 after the operator
    # confirms CF Access + OAuth flow works end-to-end. Leaving them unset here.
    WOODPECKER_OPEN: "false"

    # Postgres via CNPG-generated secret (T09). The chart interprets a map with
    # `valueFrom.secretKeyRef` as a native EnvVarSource.
    WOODPECKER_DATABASE_DRIVER: postgres
    WOODPECKER_DATABASE_DATASOURCE:
      valueFrom:
        secretKeyRef:
          name: woodpecker-postgres-app
          key: uri

  # Resource envelope — server is bursty at pipeline enqueue, idle otherwise.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Security hardening — baseline PSS, non-root.
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false # Woodpecker writes to PVC at /var/lib/woodpecker
    capabilities:
      drop:
        - ALL

# --- Agent ---------------------------------------------------------------
# Kubernetes backend — agent runs pipeline steps as k8s pods in the workflow
# namespace. DaemonSet-style is fine; chart default is Deployment with
# configurable replicas.
agent:
  enabled: true
  replicaCount: 2

  image:
    registry: docker.io
    repository: woodpeckerci/woodpecker-agent
    tag: "v3.13.0"
    pullPolicy: IfNotPresent

  env:
    WOODPECKER_SERVER: "woodpecker-server:9000"
    WOODPECKER_BACKEND: kubernetes
    WOODPECKER_BACKEND_K8S_NAMESPACE: woodpecker
    WOODPECKER_BACKEND_K8S_NAMESPACE_PER_ORGANIZATION: false
    WOODPECKER_BACKEND_K8S_VOLUME_SIZE: 10G
    WOODPECKER_CONNECT_RETRY_COUNT: "5"

  extraSecretNamesForEnvFrom:
    - woodpecker-env # supplies WOODPECKER_AGENT_SECRET for auth to server

  persistence:
    enabled: true
    size: 1Gi
    mountPath: /etc/woodpecker
    accessModes:
      - ReadWriteOnce

  # Agents spawn pipeline pods — needs RBAC to create pods, services, secrets,
  # configmaps, pvcs in the woodpecker namespace. Chart creates Role+RoleBinding
  # when serviceAccount.rbac.create=true (default).
  serviceAccount:
    create: true
    rbac:
      create: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
