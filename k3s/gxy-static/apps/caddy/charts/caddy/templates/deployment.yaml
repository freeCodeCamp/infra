apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/caddyfile: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        - name: sync-init
          image: {{ .Values.rclone.image }}
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /srv/sites
              rclone sync "r2:{{ .Values.s3.bucket }}" /srv/sites \
                --s3-provider=Cloudflare \
                --s3-endpoint="${S3_ENDPOINT}" \
                --s3-access-key-id="${AWS_ACCESS_KEY_ID}" \
                --s3-secret-access-key="${AWS_SECRET_ACCESS_KEY}" \
                --s3-no-check-bucket \
                --copy-links \
                --transfers=16 \
                --checkers=16
          envFrom:
            - secretRef:
                name: caddy-s3-credentials
          volumeMounts:
            - name: site-data
              mountPath: /srv/sites
          resources:
            {{- toYaml .Values.rcloneResources | nindent 12 }}

      containers:
        - name: caddy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: admin
              containerPort: 2019
              protocol: TCP
          envFrom:
            - secretRef:
                name: caddy-s3-credentials
          volumeMounts:
            - name: site-data
              mountPath: /srv/sites
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: caddy-data
              mountPath: /data
            - name: caddy-config
              mountPath: /config
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

        - name: rclone-sync
          image: {{ .Values.rclone.image }}
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                rclone sync "r2:{{ .Values.s3.bucket }}" /srv/sites \
                  --s3-provider=Cloudflare \
                  --s3-endpoint="${S3_ENDPOINT}" \
                  --s3-access-key-id="${AWS_ACCESS_KEY_ID}" \
                  --s3-secret-access-key="${AWS_SECRET_ACCESS_KEY}" \
                  --s3-no-check-bucket \
                  --copy-links \
                  --transfers=8 \
                  --checkers=8
                sleep 300
              done
          envFrom:
            - secretRef:
                name: caddy-s3-credentials
          volumeMounts:
            - name: site-data
              mountPath: /srv/sites
          resources:
            {{- toYaml .Values.rcloneResources | nindent 12 }}

      volumes:
        - name: site-data
          emptyDir:
            sizeLimit: 10Gi
        - name: caddyfile
          configMap:
            name: {{ .Release.Name }}-caddyfile
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config
          emptyDir: {}
