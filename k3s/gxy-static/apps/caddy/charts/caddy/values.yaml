replicaCount: 3

image:
  repository: ghcr.io/freecodecamp-universe/caddy-s3
  tag: latest
  pullPolicy: IfNotPresent

rclone:
  image: rclone/rclone:latest
  schedule: "*/5 * * * *"

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

rcloneResources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

s3:
  bucket: gxy-static-1
  region: auto
  # Credentials set via secret values overlay (infra-secrets)
  accessKeyId: ""
  secretAccessKey: ""
  endpoint: ""

nodeSelector: {}
tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - caddy-static
          topologyKey: kubernetes.io/hostname
