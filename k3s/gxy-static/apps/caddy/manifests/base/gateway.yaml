apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: caddy-gateway
  namespace: caddy
spec:
  gatewayClassName: traefik
  listeners:
    - name: websecure
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: caddy-tls-cloudflare
      allowedRoutes:
        namespaces:
          from: Same
    - name: web
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
