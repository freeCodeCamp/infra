apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  labels:
    {{- include "caddy.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.parentName }}
      namespace: {{ .Values.httpRoute.parentNamespace }}
      {{- with .Values.httpRoute.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  hostnames:
    {{- range .Values.httpRoute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - backendRefs:
        - name: {{ .Release.Name }}
          port: 80
