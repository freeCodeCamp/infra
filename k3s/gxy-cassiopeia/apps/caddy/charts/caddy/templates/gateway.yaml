apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: caddy-gateway
  labels:
    {{- include "caddy.labels" . | nindent 4 }}
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
