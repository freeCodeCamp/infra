apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-r2-credentials
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  # R2 key here MUST be read-only — write scope would let a handler bug
  # corrupt live deploys. Rotate via sops overlay + helm-upgrade.
  AWS_ACCESS_KEY_ID:     {{ required ".Values.r2.accessKeyId is required (provide via sops overlay)" .Values.r2.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ required ".Values.r2.secretAccessKey is required (provide via sops overlay)" .Values.r2.secretAccessKey | quote }}
  R2_ENDPOINT:           {{ required ".Values.r2.endpoint is required" .Values.r2.endpoint | quote }}
  R2_BUCKET:             {{ required ".Values.r2.bucket is required" .Values.r2.bucket | quote }}
