---
# Default values for the gxy-cassiopeia Caddy chart.
# Production overlay at ../../values.production.yaml.
# Secret credentials overlay at (sops) infra-secrets/k3s/gxy-cassiopeia/caddy.values.yaml.enc.

replicaCount: 1

image:
  repository: ghcr.io/freecodecamp-universe/caddy-s3
  tag: "dev"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
    # CAP_NET_BIND_SERVICE so unprivileged user can bind :80 (below 1024).
    add:
      - NET_BIND_SERVICE

# R2 credentials — populated by the sops values overlay. The Caddy key
# MUST be read-only — write access here would let a handler bug corrupt
# live data.
r2:
  bucket: ""
  endpoint: ""
  accessKeyId: "" # injected at deploy time via sops overlay
  secretAccessKey: "" # injected at deploy time via sops overlay

httpRoute:
  parentName: caddy-gateway
  parentNamespace: caddy
  sectionName: web
  hostnames:
    - "*.freecode.camp"

# Disable only for debugging in a sandbox.
networkPolicy:
  enabled: true
