---
# Consumed by `just helm-upgrade gxy-cassiopeia caddy`.
# Secret credentials come from infra-secrets/k3s/gxy-cassiopeia/caddy.values.yaml.enc.

replicaCount: 3

image:
  repository: ghcr.io/freecodecamp/caddy-s3
  # Pinned by digest — OCI spec: when tag+digest both present, digest wins.
  # Kubelet/containerd pull by digest (immutable). Resolve digest with:
  #   docker buildx imagetools inspect ghcr.io/freecodecamp/caddy-s3:<tag>
  # Canonical builder is GitHub Actions (.github/workflows/docker--caddy-s3.yml)
  # which tags every push with the full commit SHA + branch name and
  # `latest-main` on default-branch builds (build-residency principle —
  # platform pillars build outside Universe). Local fallback: `just
  # caddy-s3-build` produces `dev-<sha>` for ad-hoc testing. Bump via PR
  # with `just caddy-s3-verify` + cluster smoke-test re-run.
  tag: "sha-712c6e341f9b91320a1043683e166d487b7c2725@sha256:e024af67b4ffcaa9122553e28967aa24677ab9885ba08447f0b8f123088b0e95"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

r2:
  bucket: universe-static-apps-01
  # endpoint + accessKeyId + secretAccessKey come from the sops overlay
  # (endpoint embeds the CF account ID).

httpRoute:
  # The Gateway CR is chart-owned (charts/caddy/templates/gateway.yaml). It
  # lives in the caddy namespace alongside the HTTPRoute so the Traefik
  # Gateway API controller binds them with minimum cross-namespace wiring.
  parentName: caddy-gateway
  parentNamespace: caddy
  sectionName: web
  hostnames:
    - "*.freecode.camp"

networkPolicy:
  enabled: true
