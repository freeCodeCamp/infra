---
# Consumed by `just helm-upgrade gxy-cassiopeia caddy`.
# Secret credentials come from infra-secrets/k3s/gxy-cassiopeia/caddy.values.yaml.enc.

replicaCount: 3

image:
  repository: ghcr.io/freecodecamp-universe/caddy-s3
  # Pinned by digest — OCI spec: when tag+digest both present, digest wins.
  # Kubelet/containerd pull by digest (immutable). Resolve digest with:
  #   docker buildx imagetools inspect ghcr.io/freecodecamp-universe/caddy-s3:<tag>
  # Tag is the dev-<sha> produced by `just caddy-s3-build` until the Woodpecker
  # pipeline activates (then switch to latest-main or commit-SHA tag). Bump via
  # PR with `just caddy-s3-verify` + cluster smoke-test re-run.
  tag: "dev-509c1d1@sha256:51777286b4e26206fde749604c02834f834b226381e142e8ddb6797a712e34bd"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

r2:
  bucket: gxy-cassiopeia-1
  # endpoint + accessKeyId + secretAccessKey come from the sops overlay
  # (endpoint embeds the CF account ID).

httpRoute:
  parentName: traefik
  parentNamespace: kube-system
  hostnames:
    - "*.freecode.camp"

networkPolicy:
  enabled: true
