---
# Deploy k3s HA galaxy cluster with Cilium CNI
#
# Generic playbook for any Universe galaxy. All galaxy-specific config
# lives in inventory/group_vars/<group>.yml — not in this file.
#
# Plays: validate → sysctl + prereqs → k3s server → traefik + gateway CRDs → cilium → verify → fetch kubeconfig
#
# Prerequisites:
#   - VMs provisioned with VPC (eth1) and Tailscale connected
#   - Env vars loaded via direnv (cd into cluster dir first)
#   - Group vars populated for the target inventory group
#
# Usage:
#   cd k3s/<galaxy>
#   just play k3s--galaxy <inventory_group>

# Play 1: Validate prerequisites
- name: "K3s {{ galaxy_name | default('UNKNOWN') }} - Validate prerequisites"
  hosts: "{{ variable_host }}"
  gather_facts: true
  become: true
  vars:
    do_spaces_access_key: "{{ lookup('env', 'DO_SPACES_ACCESS_KEY') }}"
    do_spaces_secret_key: "{{ lookup('env', 'DO_SPACES_SECRET_KEY') }}"

  tasks:
    - name: Validate required group_vars are set
      assert:
        that:
          - galaxy_name is defined and galaxy_name | length > 0
          - k3s_version is defined and k3s_version | length > 0
          - cluster_cidr is defined and cluster_cidr | length > 0
          - service_cidr is defined and service_cidr | length > 0
          - cilium_cluster_id is defined and cilium_cluster_id | string | length > 0
          - gateway_api_version is defined and gateway_api_version | length > 0
          - etcd_s3_endpoint is defined and etcd_s3_endpoint | length > 0
          - etcd_s3_bucket is defined and etcd_s3_bucket | length > 0
          - etcd_s3_region is defined and etcd_s3_region | length > 0
          - etcd_snapshot_schedule is defined and etcd_snapshot_schedule | length > 0
          - etcd_snapshot_retention is defined
        fail_msg: "Missing group_vars. Populate inventory/group_vars/{{ variable_host }}.yml"

    - name: Validate env vars loaded
      assert:
        that:
          - do_spaces_access_key | length > 0
          - do_spaces_secret_key | length > 0
        fail_msg: "DO_SPACES_ACCESS_KEY/SECRET_KEY not set. cd into cluster dir first."

    - name: Validate VPC interface exists (eth1)
      assert:
        that:
          - ansible_eth1 is defined
          - ansible_eth1.ipv4 is defined
          - ansible_eth1.ipv4.address is defined
        fail_msg: "VPC interface eth1 not found."

    - name: Validate VPC IP is in expected range
      assert:
        that:
          - ansible_eth1.ipv4.address | regex_search('^10\.')
        fail_msg: "VPC IP {{ ansible_eth1.ipv4.address }} not in 10.x.x.x range."

    - name: Validate Tailscale is connected
      assert:
        that:
          - ansible_tailscale0 is defined
          - ansible_tailscale0.ipv4 is defined
          - ansible_tailscale0.ipv4.address is defined
        fail_msg: "Tailscale not connected."

    - name: Set network facts
      set_fact:
        vpc_ip: "{{ ansible_eth1.ipv4.address }}"
        tailscale_ip: "{{ ansible_tailscale0.ipv4.address }}"

    - name: Display configuration
      debug:
        msg: >-
          {{ inventory_hostname }}: VPC={{ vpc_ip }}, Tailscale={{ tailscale_ip }},
          galaxy={{ galaxy_name }}, k3s={{ k3s_version }},
          pods={{ cluster_cidr }}, svc={{ service_cidr }}

    - name: Build dynamic groups
      group_by:
        key: "{{ item }}"
      loop:
        - k3s_cluster
        - server

# Play 2: System prerequisites
- name: "K3s {{ galaxy_name | default('UNKNOWN') }} - System prerequisites"
  hosts: k3s_cluster
  gather_facts: true
  become: true
  vars:
    cluster_config_dir: "{{ playbook_dir }}/../k3s/{{ galaxy_name }}"

  pre_tasks:
    - name: Set kubelet kernel parameters (CIS hardening)
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/90-kubelet.conf
        reload: true
      loop:
        - { key: vm.overcommit_memory, value: "1" }
        - { key: vm.panic_on_oom, value: "0" }
        - { key: kernel.panic, value: "10" }
        - { key: kernel.panic_on_oops, value: "1" }

    - name: Ensure k3s config directory exists
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Copy PSS admission config
      copy:
        src: "{{ cluster_config_dir }}/cluster/security/pss-admission.yaml"
        dest: /etc/rancher/k3s/pss-admission.yaml
        mode: "0600"

    - name: Copy audit policy
      copy:
        src: "{{ cluster_config_dir }}/cluster/security/audit-policy.yaml"
        dest: /etc/rancher/k3s/audit-policy.yaml
        mode: "0600"

  roles:
    - role: k3s.orchestration.prereq

# Play 3: Deploy k3s server
- name: "K3s {{ galaxy_name | default('UNKNOWN') }} - Deploy k3s server"
  hosts: server
  gather_facts: true
  become: true
  vars:
    do_spaces_access_key: "{{ lookup('env', 'DO_SPACES_ACCESS_KEY') }}"
    do_spaces_secret_key: "{{ lookup('env', 'DO_SPACES_SECRET_KEY') }}"
    api_endpoint: "{{ hostvars[groups['server'][0]]['vpc_ip'] }}"
    extra_server_args: >-
      --node-ip={{ hostvars[inventory_hostname]['vpc_ip'] }}
      --advertise-address={{ hostvars[inventory_hostname]['vpc_ip'] }}
      --tls-san={{ hostvars[inventory_hostname]['vpc_ip'] }}
      --tls-san={{ hostvars[inventory_hostname]['tailscale_ip'] }}
      --flannel-backend=none
      --disable-network-policy
      --disable-kube-proxy
      --secrets-encryption
      --protect-kernel-defaults
      --cluster-cidr={{ cluster_cidr }}
      --service-cidr={{ service_cidr }}
      --kube-apiserver-arg=admission-control-config-file=/etc/rancher/k3s/pss-admission.yaml
      --kube-apiserver-arg=audit-log-path=/var/log/k3s/audit.log
      --kube-apiserver-arg=audit-policy-file=/etc/rancher/k3s/audit-policy.yaml
      --etcd-s3
      --etcd-s3-endpoint={{ etcd_s3_endpoint }}
      --etcd-s3-bucket={{ etcd_s3_bucket }}
      --etcd-s3-folder=etcd/{{ galaxy_name }}
      --etcd-s3-region={{ etcd_s3_region }}
      # Cron string MUST be double-quoted — systemd word-splits without them
      --etcd-snapshot-schedule-cron="{{ etcd_snapshot_schedule }}"
      --etcd-snapshot-retention={{ etcd_snapshot_retention }}
    server_group: server

  pre_tasks:
    - name: Create audit log directory
      file:
        path: /var/log/k3s
        state: directory
        mode: "0750"

    - name: Write S3 credentials to service environment
      ansible.builtin.lineinfile:
        path: /etc/systemd/system/k3s.service.env
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
        create: true
        mode: "0600"
      loop:
        - { key: AWS_ACCESS_KEY_ID, value: "{{ do_spaces_access_key }}" }
        - { key: AWS_SECRET_ACCESS_KEY, value: "{{ do_spaces_secret_key }}" }
      no_log: true

  roles:
    - role: k3s.orchestration.k3s_server

# Play 4: Configure ingress
- name: "K3s {{ galaxy_name | default('UNKNOWN') }} - Configure ingress"
  hosts: server[0]
  gather_facts: false
  become: true

  tasks:
    - name: Apply Traefik HelmChartConfig
      copy:
        src: "{{ playbook_dir }}/../k3s/{{ galaxy_name }}/cluster/traefik-config.yaml"
        dest: /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
        mode: "0600"

    - name: Install Gateway API CRDs
      command: >
        k3s kubectl apply -f
        https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ gateway_api_version }}/standard-install.yaml
      register: gateway_result
      changed_when: "'created' in gateway_result.stdout or 'configured' in gateway_result.stdout"

# Play 5: Install Cilium (must run before nodes can be Ready)
- name: "K3s {{ galaxy_name | default('UNKNOWN') }} - Install Cilium"
  hosts: server[0]
  gather_facts: false
  become: true
  vars:
    cluster_config_dir: "{{ playbook_dir }}/../k3s/{{ galaxy_name }}"
  roles:
    - role: cilium
      vars:
        cilium_cluster_name: "{{ galaxy_name }}"
        cilium_values_file: "{{ cluster_config_dir }}/cluster/cilium/values.yaml"
        cilium_k8s_service_host: "{{ hostvars[groups['server'][0]]['vpc_ip'] }}"

# Play 6: Wait for cluster ready (after Cilium provides the CNI)
- name: "K3s {{ galaxy_name | default('UNKNOWN') }} - Verify cluster"
  hosts: server[0]
  gather_facts: false
  become: true

  tasks:
    - name: Wait for all nodes ready
      command: k3s kubectl wait --for=condition=Ready nodes --all --timeout=300s
      changed_when: false

    - name: Display cluster status
      command: k3s kubectl get nodes -o wide
      register: cluster_status
      changed_when: false

    - name: Cluster ready
      debug:
        msg: "{{ cluster_status.stdout_lines }}"

# Play 7: Fetch kubeconfig
- name: "K3s {{ galaxy_name | default('UNKNOWN') }} - Fetch kubeconfig"
  hosts: server[0]
  gather_facts: false
  become: true
  vars:
    cluster_config_dir: "{{ playbook_dir }}/../k3s/{{ galaxy_name }}"

  tasks:
    - name: Read kubeconfig from server
      slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw

    - name: Write kubeconfig locally (replace server IP with Tailscale IP)
      copy:
        content: "{{ kubeconfig_raw.content | b64decode | regex_replace('127\\.0\\.0\\.1', hostvars[inventory_hostname]['tailscale_ip']) }}"
        dest: "{{ cluster_config_dir }}/.kubeconfig.yaml"
        mode: "0600"
      delegate_to: localhost
      become: false

    - name: Verify kubectl connectivity
      command: kubectl get nodes
      environment:
        KUBECONFIG: "{{ cluster_config_dir }}/.kubeconfig.yaml"
      register: kubectl_result
      changed_when: false
      delegate_to: localhost
      become: false

    - name: Display final status
      debug:
        msg:
          - "=== {{ galaxy_name }} cluster ready ==="
          - "Kubeconfig: k3s/{{ galaxy_name }}/.kubeconfig.yaml"
          - "{{ kubectl_result.stdout }}"
