---
# gxy-management galaxy configuration
# Applied automatically when targeting the gxy_mgmt_k3s inventory group

galaxy_name: gxy-management

# k3s
k3s_version: v1.34.5+k3s1

# Networking (ADR-009: non-overlapping per galaxy)
cluster_cidr: "10.1.0.0/16"
service_cidr: "10.11.0.0/16"

# Cilium CNI
cilium_cluster_id: 1

# Gateway API
gateway_api_version: v1.5.1

# etcd S3 backups (DO Spaces)
etcd_s3_endpoint: fra1.digitaloceanspaces.com
etcd_s3_bucket: net.freecodecamp.universe-backups
etcd_s3_region: fra1
etcd_snapshot_schedule: "0 */6 * * *"
etcd_snapshot_retention: 20
