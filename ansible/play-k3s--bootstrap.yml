---
# Deploy k3s HA galaxy cluster with Cilium CNI
#
# Generic playbook for any Universe galaxy. All galaxy-specific config
# lives in inventory/group_vars/<group>.yml — not in this file.
#
# Plays: validate → prereqs → k3s server → cilium → verify + kubeconfig
#
# Prerequisites:
#   - VMs provisioned with VPC (eth1) and Tailscale connected
#   - DO cloud firewall allows: 2379-2380, 4240, 5001, 6443, 8472, 10250 between VPC nodes
#   - Env vars loaded via direnv (cd into cluster dir first)
#   - Group vars populated for the target inventory group
#
# Usage:
#   cd k3s/<galaxy>
#   just play k3s--galaxy <inventory_group>

# Play 1: Validate prerequisites and build dynamic groups
- name: "K3s {{ variable_host }} - Validate"
  hosts: "{{ variable_host }}"
  gather_facts: true
  become: true
  vars:
    do_spaces_access_key: "{{ lookup('env', 'DO_SPACES_ACCESS_KEY') }}"
    do_spaces_secret_key: "{{ lookup('env', 'DO_SPACES_SECRET_KEY') }}"

  tasks:
    - name: Validate required group_vars
      assert:
        that:
          - galaxy_name is defined and galaxy_name | length > 0
          - k3s_version is defined and k3s_version | length > 0
          - server_config_yaml is defined and server_config_yaml | length > 0
          - cilium_cluster_id is defined and cilium_cluster_id | string | length > 0
        fail_msg: "Missing group_vars. Populate inventory/group_vars/{{ variable_host }}.yml"

    - name: Validate env vars loaded
      assert:
        that:
          - do_spaces_access_key | length > 0
          - do_spaces_secret_key | length > 0
        fail_msg: "DO_SPACES_ACCESS_KEY/SECRET_KEY not set. cd into cluster dir first."

    - name: Validate VPC interface (eth1)
      assert:
        that:
          - ansible_eth1 is defined
          - ansible_eth1.ipv4 is defined
          - ansible_eth1.ipv4.address | regex_search('^10\.')
        fail_msg: "VPC interface eth1 not found or IP not in 10.x.x.x range."

    - name: Validate Tailscale connected
      assert:
        that:
          - ansible_tailscale0 is defined
          - ansible_tailscale0.ipv4 is defined
        fail_msg: "Tailscale not connected."

    - name: Set network facts
      set_fact:
        vpc_ip: "{{ ansible_eth1.ipv4.address }}"
        tailscale_ip: "{{ ansible_tailscale0.ipv4.address }}"

    - name: Display configuration
      debug:
        msg: "{{ inventory_hostname }}: VPC={{ vpc_ip }}, TS={{ tailscale_ip }}, galaxy={{ galaxy_name }}"

    - name: Build dynamic groups
      group_by:
        key: "{{ item }}"
      loop: [k3s_cluster, server]

# Play 2: System prerequisites (before k3s starts)
- name: "K3s {{ variable_host }} - Prerequisites"
  hosts: k3s_cluster
  gather_facts: true
  become: true
  vars:
    cluster_config_dir: "{{ playbook_dir }}/../k3s/{{ galaxy_name }}"

  pre_tasks:
    - name: Set CIS kubelet kernel parameters
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/90-kubelet.conf
        reload: true
      loop:
        - { key: vm.overcommit_memory, value: "1" }
        - { key: vm.panic_on_oom, value: "0" }
        - { key: kernel.panic, value: "10" }
        - { key: kernel.panic_on_oops, value: "1" }

    - name: Ensure k3s directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /etc/rancher/k3s
        - /var/lib/rancher/k3s/server/manifests
        - /var/log/k3s

    - name: Copy PSS admission config
      copy:
        src: "{{ cluster_config_dir }}/cluster/security/pss-admission.yaml"
        dest: /etc/rancher/k3s/pss-admission.yaml
        mode: "0600"

    - name: Copy audit policy
      copy:
        src: "{{ cluster_config_dir }}/cluster/security/audit-policy.yaml"
        dest: /etc/rancher/k3s/audit-policy.yaml
        mode: "0600"

    - name: Copy Traefik HelmChartConfig
      copy:
        src: "{{ cluster_config_dir }}/cluster/traefik-config.yaml"
        dest: /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
        mode: "0600"

  roles:
    - role: k3s.orchestration.prereq

# Play 3: Deploy k3s server
- name: "K3s {{ variable_host }} - Deploy"
  hosts: server
  gather_facts: true
  become: true
  vars:
    api_endpoint: "{{ hostvars[groups['server'][0]]['vpc_ip'] }}"
    extra_server_args: >-
      --node-ip={{ hostvars[inventory_hostname]['vpc_ip'] }}
      --advertise-address={{ hostvars[inventory_hostname]['vpc_ip'] }}
      --tls-san={{ hostvars[inventory_hostname]['vpc_ip'] }}
      --tls-san={{ hostvars[inventory_hostname]['tailscale_ip'] }}
    server_group: server
    user_kubectl: false
  roles:
    - role: k3s.orchestration.k3s_server
  post_tasks:
    - name: Inject S3 credentials into k3s config.yaml
      ansible.builtin.lineinfile:
        path: /etc/rancher/k3s/config.yaml
        regexp: "^{{ item.key }}:"
        line: '{{ item.key }}: "{{ item.value }}"'
        mode: "0600"
      loop:
        - {
            key: "etcd-s3-access-key",
            value: "{{ lookup('env', 'DO_SPACES_ACCESS_KEY') }}",
          }
        - {
            key: "etcd-s3-secret-key",
            value: "{{ lookup('env', 'DO_SPACES_SECRET_KEY') }}",
          }
      no_log: true
      notify: restart k3s
  handlers:
    - name: restart k3s
      systemd:
        name: k3s
        state: restarted
        daemon_reload: true

# Play 4: Install Cilium CNI
- name: "K3s {{ variable_host }} - Cilium"
  hosts: server[0]
  gather_facts: false
  become: true
  vars:
    cluster_config_dir: "{{ playbook_dir }}/../k3s/{{ galaxy_name }}"
  roles:
    - role: cilium
      vars:
        cilium_cluster_name: "{{ galaxy_name }}"
        cilium_values_file: "{{ cluster_config_dir }}/cluster/cilium/values.yaml"
        cilium_k8s_service_host: "{{ hostvars[groups['server'][0]]['vpc_ip'] }}"

# Play 5: Verify cluster and fetch kubeconfig
- name: "K3s {{ variable_host }} - Verify"
  hosts: server[0]
  gather_facts: false
  become: true
  vars:
    cluster_config_dir: "{{ playbook_dir }}/../k3s/{{ galaxy_name }}"

  tasks:
    - name: Wait for all nodes Ready
      command: k3s kubectl wait --for=condition=Ready nodes --all --timeout=300s
      register: wait_result
      retries: 3
      delay: 30
      until: wait_result.rc == 0
      changed_when: false

    - name: Display cluster status
      command: k3s kubectl get nodes -o wide
      register: cluster_status
      changed_when: false

    - name: Cluster ready
      debug:
        msg: "{{ cluster_status.stdout_lines }}"

    - name: Read kubeconfig
      slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_raw
      no_log: true

    - name: Write kubeconfig locally
      copy:
        content: "{{ kubeconfig_raw.content | b64decode }}"
        dest: "{{ cluster_config_dir }}/.kubeconfig.yaml"
        mode: "0600"
      delegate_to: localhost
      become: false
      no_log: true

    - name: Fix kubeconfig server address (use Tailscale IP)
      delegate_to: localhost
      become: false
      ansible.builtin.replace:
        path: "{{ cluster_config_dir }}/.kubeconfig.yaml"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ hostvars[inventory_hostname]['tailscale_ip'] }}:6443"

    - name: Fix kubeconfig context name
      delegate_to: localhost
      become: false
      ansible.builtin.replace:
        path: "{{ cluster_config_dir }}/.kubeconfig.yaml"
        regexp: '(\s+)(name|cluster|user|current-context): default'
        replace: '\1\2: {{ galaxy_name }}'

    - name: Verify kubectl connectivity
      command: kubectl get nodes
      environment:
        KUBECONFIG: "{{ cluster_config_dir }}/.kubeconfig.yaml"
      register: kubectl_result
      changed_when: false
      delegate_to: localhost
      become: false

    - name: Patch metrics-server for hostNetwork (pod→nodeIP workaround)
      command: >-
        k3s kubectl -n kube-system patch deploy metrics-server
        --type=json
        -p='[{"op":"add","path":"/spec/template/spec/hostNetwork","value":true},
             {"op":"replace","path":"/spec/template/spec/containers/0/ports/0/containerPort","value":4443},
             {"op":"replace","path":"/spec/template/spec/containers/0/args","value":["--cert-dir=/tmp","--secure-port=4443","--kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname","--kubelet-use-node-status-port","--metric-resolution=15s"]}]'
      register: patch_result
      changed_when: "'patched' in patch_result.stdout"
      failed_when: false
      retries: 5
      delay: 10
      until: patch_result.rc == 0

    - name: Done
      debug:
        msg:
          - "=== {{ galaxy_name }} cluster ready ==="
          - "Kubeconfig: k3s/{{ galaxy_name }}/.kubeconfig.yaml"
          - "{{ kubectl_result.stdout }}"
