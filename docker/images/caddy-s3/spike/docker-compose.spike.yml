---
# docker-compose.spike.yml — T31 Caddyfile PoC harness
#
# Spins up Minio (R2-compatible S3) + Caddy (with caddy-fs-s3 only, NO r2_alias)
# and loads test fixtures. Operator runs the test cases in REPORT.md.
#
# Usage:
#   cd docker/images/caddy-s3/spike
#   docker compose -f docker-compose.spike.yml up --build -d
#   # Run tests documented in docs/rfc/spikes/gxy-cassiopeia-caddyfile-poc.md
#   docker compose -f docker-compose.spike.yml down -v

name: gxy-cassiopeia-spike

services:
  minio:
    image: minio/minio:RELEASE.2026-03-17T09-32-18Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 2s
      retries: 5
    volumes:
      - minio-data:/data

  fixtures:
    image: minio/mc:RELEASE.2026-03-17T09-32-18Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "
        set -eu;
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb -p local/spike-test || true;
        # Deploy artifacts
        printf 'site-a deploy 2 (production)' | mc pipe local/spike-test/site-a/deploys/20260418-130000-def5678/index.html;
        printf 'site-a deploy 1 (preview)'    | mc pipe local/spike-test/site-a/deploys/20260418-120000-abc1234/index.html;
        # Alias files (plain text, no trailing newline per RFC §4.4.3)
        printf '20260418-130000-def5678' | mc pipe local/spike-test/site-a/production;
        printf '20260418-120000-abc1234' | mc pipe local/spike-test/site-a/preview;
        echo 'fixtures loaded';
      "
    restart: "no"

  caddy:
    # Use the upstream caddy builder to build a Caddy with ONLY caddy-fs-s3.
    # This spike deliberately EXCLUDES the r2_alias custom module — the
    # entire point is to prove viability without it.
    build:
      context: .
      dockerfile_inline: |
        FROM caddy:2.11-builder AS builder
        RUN xcaddy build v2.11.2 \
            --with github.com/sagikazarmark/caddy-fs-s3@v0.12.0
        FROM caddy:2.11-alpine
        COPY --from=builder /usr/bin/caddy /usr/bin/caddy
    depends_on:
      minio:
        condition: service_healthy
      fixtures:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./Caddyfile.spike:/etc/caddy/Caddyfile:ro

volumes:
  minio-data:
