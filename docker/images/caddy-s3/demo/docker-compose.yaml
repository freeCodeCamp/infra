services:
  s3mock:
    image: adobe/s3mock:5.0.0
    environment:
      COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS: demo
    ports:
      - "9090:9090"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:9090/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 2s
      timeout: 2s
      retries: 15

  seed:
    build:
      context: ./seed
    depends_on:
      s3mock:
        condition: service_healthy
    volumes:
      - ./fixtures:/fixtures:ro
    # Re-run with: docker compose run --rm seed -alias v2
    command: ["-alias", "v1"]

  caddy:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      seed:
        condition: service_completed_successfully
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile"]
