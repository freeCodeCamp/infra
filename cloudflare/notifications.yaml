---
# cloudflare/notifications.yaml
# Declarative Cloudflare Notifications for gxy-cassiopeia (T24).
#
# Spec: docs/rfc/gxy-cassiopeia.md §10.3 + §12.2 row "Cache-fill attack detection lag"
#       (post-review W4: canary-latency / origin-response-time alert).
#
# Applied via: just cf-notifications-apply
#
# Notes:
# - The `destinations` field references CF Notification Destinations already
#   provisioned in the account. The apply script reads the destination IDs via
#   the CF API and substitutes by name.
# - Google Chat destination name: "Platform Team — Google Chat" (existing,
#   provisioned earlier for windmill alerts — verify in CF dashboard).
# - Email destination name: "Platform Team Email" (distribution list).
# - `zone` is resolved at apply time by scripts/cf-notifications-apply.sh.

zone: freecode.camp

notifications:
  - name: gxy-cassiopeia-zone-5xx
    description: >-
      Zone-level 5xx rate spike on freecode.camp (RFC §10.3).
      Trigger: 5xx rate > 1% for 5m.
    alert_type: http_alert_origin_error
    enabled: true
    filters:
      new_health: [unhealthy]
      zones: [freecode.camp]
      incident_impact: [INCIDENT_IMPACT_NONE, INCIDENT_IMPACT_MINOR]
    destinations:
      - "Platform Team Email"
      - "Platform Team — Google Chat"

  - name: gxy-cassiopeia-origin-error-rate
    description: >-
      Origin error rate > 5% for 5m (RFC §10.3). Indicates Caddy pod
      failure or R2 connectivity issue.
    alert_type: http_alert_origin_error
    enabled: true
    mechanisms:
      threshold_pct: 5
      duration_minutes: 5
    destinations:
      - "Platform Team Email"
      - "Platform Team — Google Chat"

  - name: gxy-cassiopeia-origin-response-time
    # W4 addition (post-review 2026-04-18): primary-signal cache-fill detection.
    # Detects LRU thrashing via origin p95 latency impact, hours earlier than
    # CF 5xx zone alerts. Not a replacement for the deferred
    # r2alias_cache_miss_rate metric (which waits for gxy-backoffice).
    description: >-
      Origin p95 response time > 1500ms over 5m (W4 canary). Detects
      cache-fill thrashing before it surfaces as 5xx.
    alert_type: real_origin_monitoring
    enabled: true
    mechanisms:
      threshold_ms: 1500
      duration_minutes: 5
      percentile: p95
    destinations:
      - "Platform Team Email"
      - "Platform Team — Google Chat"

  - name: gxy-cassiopeia-ssl-expiry
    description: >-
      SSL certificate expiry for freecode.camp < 7 days. Universal SSL
      auto-renews but this catches renewal failures.
    alert_type: universal_ssl_event_type
    enabled: true
    filters:
      zones: [freecode.camp]
    destinations:
      - "Platform Team Email"

verification:
  # Synthetic cache-fill trigger procedure (T25 cutover runbook references this):
  # 1. From a staging node: `hey -z 5m -c 200 -H "Host: nonexistent-$(date +%s).freecode.camp" https://gxy-cassiopeia-1.r2.edge/`
  #    to generate unique Host headers.
  # 2. Confirm gxy-cassiopeia-origin-response-time fires within 10 minutes.
  # 3. Stop the synthetic load; alert clears within 15 minutes.
  # If verification fails, W4 coverage is broken — block T25 until resolved.
  cache_fill_synthetic_test_required: true
